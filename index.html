<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teacher's Nexus - 時間割＆タスク管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark body { background-color: #0f172a; color: #f1f5f9; }
        .dark .bg-slate-50 { background-color: #1e293b; }
        .dark .bg-white { background-color: #0f172a; }
        .dark .border-slate-200 { border-color: #334155; }
        .dark .text-slate-800 { color: #f1f5f9; }
        * { transition: background-color 0.2s; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 99px; font-size: 12px; font-weight: bold; z-index: 9999; animation: fade 3s forwards; pointer-events: none;}
        @keyframes fade { 0%{opacity:0; transform:translate(-50%,20px)} 10%,90%{opacity:1; transform:translate(-50%,0)} 100%{opacity:0; transform:translate(-50%,-20px)} }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col overflow-hidden text-slate-800">
    <header class="bg-white border-b border-slate-200 px-3 py-2 flex flex-col items-center w-full shrink-0">
        <div class="flex items-center justify-between w-full max-w-3xl h-[40px]">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 text-white w-8 h-8 rounded-lg flex items-center justify-center"><i class="fa-solid fa-chalkboard-user"></i></div>
                <h1 class="font-black text-lg hidden md:block">Teacher's Nexus</h1>
            </div>
            <div class="flex items-center gap-2">
                <div class="bg-slate-100 p-0.5 rounded-lg flex text-xs font-bold shadow-inner">
                    <button onclick="chgView('daily')" id="v-daily" class="px-3 py-1.5 rounded bg-white shadow-sm text-blue-600">日</button>
                    <button onclick="chgView('weekly')" id="v-weekly" class="px-3 py-1.5 rounded text-slate-500">週</button>
                </div>
                <button onclick="$('settings-modal').classList.remove('hidden')" class="bg-slate-800 text-white px-3 py-1.5 rounded-lg text-xs hover:bg-slate-700"><i class="fa-solid fa-sliders"></i></button>
            </div>
        </div>
        <div class="flex items-center justify-between w-full max-w-3xl h-[36px] mt-1">
            <div class="flex items-center gap-1">
                <button onclick="chgWeek(-1)" class="px-2 py-1 text-slate-400 hover:bg-slate-100 rounded"><i class="fa-solid fa-chevron-left"></i></button>
                <h2 class="text-xl font-black" id="lbl-day">月曜日</h2>
                <span class="text-xs font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded mx-1" id="lbl-date"></span>
                <button onclick="chgWeek(1)" class="px-2 py-1 text-slate-400 hover:bg-slate-100 rounded"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
            <div id="nav-days" class="flex gap-1"></div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <section class="w-64 md:w-72 border-r border-slate-200 bg-white flex flex-col shrink-0">
            <div class="p-3 border-b border-slate-100 bg-slate-50/50">
                <div class="flex items-center justify-between mb-2">
                    <div class="flex items-center gap-1.5">
                        <h2 class="font-bold text-sm"><i class="fa-solid fa-list-check text-blue-600"></i> 未計画</h2>
                        <button onclick="mockSync()" class="text-blue-500 hover:bg-blue-100 p-1 rounded transition-colors"><i class="fa-solid fa-rotate"></i></button>
                    </div>
                    <span id="task-cnt" class="bg-blue-50 text-blue-700 text-[10px] font-bold px-2 py-0.5 rounded-full border border-blue-100">0</span>
                </div>
                <form onsubmit="addTask(event)" class="flex gap-1.5">
                    <input type="text" id="new-task" required placeholder="タスク追加..." class="flex-1 border border-slate-200 rounded px-2 py-1 text-xs focus:ring-1 focus:ring-blue-500">
                    <button type="submit" class="bg-blue-600 text-white px-3 py-1 rounded text-xs font-bold"><i class="fa-solid fa-plus"></i></button>
                </form>
            </div>
            <div id="move-msg" class="px-3 pt-2 empty:hidden"></div>
            <div class="px-3 py-2 border-b border-slate-100 flex flex-wrap gap-1 shrink-0" id="list-tabs"></div>
            <div class="flex-1 overflow-y-auto p-3 space-y-2" id="task-list"></div>
        </section>
        <main class="flex-1 bg-slate-50 p-2 md:p-4 overflow-y-auto">
            <div id="timetable" class="max-w-3xl mx-auto"></div>
        </main>
    </div>

    <div id="settings-modal" class="hidden fixed inset-0 bg-slate-950/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-md rounded-xl shadow-xl flex flex-col max-h-[90vh]">
            <div class="p-4 border-b flex justify-between items-center">
                <h3 class="font-black text-lg"><i class="fa-solid fa-sliders text-slate-500 mr-2"></i>メニュー設定</h3>
                <button onclick="$('settings-modal').classList.add('hidden')" class="text-slate-400 p-2"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-4 overflow-y-auto space-y-4">
                <button onclick="toggleDark()" class="w-full text-left px-3 py-2 text-sm bg-slate-50 rounded-lg font-bold">🌓 ダークモード切替</button>
                <button onclick="openSubjModal()" class="w-full text-left px-3 py-2 text-sm bg-slate-50 rounded-lg font-bold">🎨 科目と色の設定</button>
                <button onclick="openBaseModal()" class="w-full text-left px-3 py-2 text-sm bg-slate-50 rounded-lg font-bold">📅 基本時間割の設定</button>
                
                <div class="border-t pt-3">
                    <h4 class="text-sm font-bold mb-2">端末間同期（データ引継ぎ）</h4>
                    <div class="flex gap-2">
                        <button onclick="exportData()" class="flex-1 bg-slate-800 text-white text-xs py-2 rounded font-bold"><i class="fa-solid fa-download"></i> 書き出し</button>
                        <label class="flex-1 bg-slate-200 text-slate-700 text-xs py-2 rounded font-bold text-center cursor-pointer">
                            <i class="fa-solid fa-upload"></i> 読み込み
                            <input type="file" accept=".json" class="hidden" onchange="importData(event)">
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="subj-modal" class="hidden fixed inset-0 bg-slate-950/40 flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-sm rounded-xl p-4 flex flex-col max-h-[80vh]">
            <h3 class="font-black mb-3">🎨 科目設定</h3>
            <div id="subj-list" class="overflow-y-auto flex-1 space-y-2 mb-3"></div>
            <div class="flex justify-between">
                <button onclick="addSubj()" class="text-sm font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded">追加</button>
                <div>
                    <button onclick="$('subj-modal').classList.add('hidden')" class="text-sm px-3 py-1">戻る</button>
                    <button onclick="saveSubj()" class="text-sm font-bold text-white bg-blue-600 px-3 py-1 rounded">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div id="base-modal" class="hidden fixed inset-0 bg-slate-950/40 flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-4xl rounded-xl p-4 flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-black text-lg">📅 基本時間割</h3>
                <button onclick="saveBase()" class="bg-blue-600 text-white px-4 py-1.5 rounded font-bold text-sm">保存</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-2 overflow-y-auto" id="base-grid"></div>
        </div>
    </div>

    <div id="detail-modal" class="hidden fixed inset-0 bg-slate-950/40 flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-md rounded-xl p-5">
            <div class="flex justify-between mb-3">
                <div>
                    <span id="dtl-num" class="text-xs font-black bg-slate-200 px-2 py-1 rounded"></span>
                    <button onclick="$('tc-form').classList.toggle('hidden')" class="ml-2 text-[10px] bg-slate-100 px-2 py-1 rounded"><i class="fa-solid fa-pen"></i> 今週変更</button>
                    <h3 id="dtl-title" class="font-black text-xl mt-1"></h3>
                </div>
                <button onclick="$('detail-modal').classList.add('hidden')" class="text-slate-400 self-start"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <div id="tc-form" class="hidden bg-amber-50 p-3 rounded mb-3 text-xs">
                <div class="flex gap-2 mb-2">
                    <select id="tc-type" class="border rounded p-1"><option value="class">授業</option><option value="empty">空き</option><option value="afterschool">放課後</option></select>
                    <select id="tc-subj" class="flex-1 border rounded p-1"></select>
                </div>
                <div class="flex justify-end gap-2"><button onclick="resetTc()" class="px-2 py-1 bg-slate-200 rounded">基本に戻す</button><button onclick="saveTc()" class="px-2 py-1 bg-amber-600 text-white rounded">変更保存</button></div>
            </div>

            <div><label class="text-xs font-bold block mb-1">この時間のタスク</label><div id="dtl-tasks" class="space-y-1"></div></div>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const days = ['Mon','Tue','Wed','Thu','Fri'];
        const dayN = {'Mon':'月','Tue':'火','Wed':'水','Thu':'木','Fri':'金'};
        
        let cDay='Mon', cWeek=1, view='daily', moveId=null, actPeriod=null, actDay=null, fltr='all';
        let data = { tt:{}, tasks:[], subjs:[], tc:{}, lists:['GoogleToDo1', 'その他'] };
        
        const pals = [
            {bg:'bg-red-50', b:'border-red-400 border-l-4', bdg:'bg-red-200 text-red-800'},
            {bg:'bg-blue-50', b:'border-blue-400 border-l-4', bdg:'bg-blue-200 text-blue-800'},
            {bg:'bg-emerald-50', b:'border-emerald-400 border-l-4', bdg:'bg-emerald-200 text-emerald-800'},
            {bg:'bg-purple-50', b:'border-purple-400 border-l-4', bdg:'bg-purple-200 text-purple-800'},
            {bg:'bg-amber-50', b:'border-amber-400 border-l-4', bdg:'bg-amber-200 text-amber-800'}
        ];

        function init() {
            const sd = localStorage.getItem('tn_data');
            if(sd) { data = JSON.parse(sd); }
            else {
                days.forEach(d => {
                    data.tt[d] = [];
                    for(let i=1; i<=7; i++) data.tt[d].push({id:'p'+i, n:i+'', t:'empty', s:'空き'});
                    data.tt[d].splice(3,0,{id:'pn', n:'昼', t:'empty', s:'昼休み'});
                    data.tt[d].push({id:'pa', n:'放', t:'afterschool', s:'放課後'});
                });
                data.subjs = [{n:'国語',c:0},{n:'数学',c:1},{n:'理科',c:2}];
            }
            if(localStorage.getItem('tn_dark')==='true') document.documentElement.classList.add('dark');
            buildNav(); drawAll();
        }

        function buildNav() {
            $('nav-days').innerHTML = days.map(d => `<button onclick="chgDay('${d}')" id="btn-${d}" class="w-8 h-8 rounded-full text-xs font-bold ${d===cDay?'bg-blue-600 text-white':'text-slate-500'}">${dayN[d]}</button>`).join('');
        }

        function chgView(v) { view = v; $('v-daily').className = `px-3 py-1.5 rounded ${v==='daily'?'bg-white shadow-sm text-blue-600':'text-slate-500'}`; $('v-weekly').className = `px-3 py-1.5 rounded ${v==='weekly'?'bg-white shadow-sm text-blue-600':'text-slate-500'}`; $('nav-days').className = v==='weekly'?'flex gap-1 invisible':'flex gap-1'; drawAll(); }
        function chgDay(d) { cDay = d; buildNav(); drawAll(); }
        function chgWeek(delta) { cWeek += delta; if(cWeek<1) cWeek=1; drawAll(); }
        
        function getCol(s, t) {
            if(t==='empty') return {bg:'bg-transparent border-dashed', b:'border-slate-300', bdg:'bg-slate-200 text-slate-700'};
            if(t==='afterschool') return {bg:'bg-indigo-50 border-solid', b:'border-indigo-200', bdg:'bg-indigo-200 text-indigo-800'};
            let f = data.subjs.find(x=>x.n===s);
            return f ? pals[f.c%5] : pals[s.length%5];
        }

        function drawAll() {
            $('lbl-day').innerText = view==='daily' ? dayN[cDay]+'曜日' : '週表示';
            $('lbl-date').innerText = '第'+cWeek+'週';
            
            drawTasks();
            const tc = $('timetable');
            tc.innerHTML = '';
            tc.className = view==='daily' ? "flex flex-col gap-3" : "grid grid-cols-5 gap-1.5";
            
            const ds = view==='daily' ? [cDay] : days;
            ds.forEach(d => {
                const col = document.createElement('div');
                if(view==='weekly') col.className = "bg-white border rounded p-1";
                if(view==='weekly') col.innerHTML = `<div class="text-center font-bold text-xs mb-1">${dayN[d]}</div>`;
                const wrp = document.createElement('div');
                wrp.className = view==='daily' ? "space-y-3" : "space-y-1.5";
                
                data.tt[d].forEach(p => {
                    const key = `w${cWeek}-${d}-${p.id}`;
                    const pd = data.tc[key] ? {...p, ...data.tc[key]} : p;
                    const c = getCol(pd.s, pd.t);
                    const ts = data.tasks.filter(t => t.pid===key && !t.done);
                    
                    const el = document.createElement('div');
                    el.className = `${c.bg} border ${c.b} rounded p-1.5 cursor-pointer shadow-sm relative group hover:brightness-95 transition-all flex flex-col justify-between ${pd.n==='昼'?'min-h-[30px]':'min-h-[75px]'}`;
                    if(moveId) el.className += " ring-2 ring-blue-500 animate-pulse";
                    
                    el.onclick = () => moveId ? assignT(key) : openDtl(p.id, d);
                    el.innerHTML = `<div class="flex gap-1.5"><span class="px-1 text-[10px] font-black rounded ${c.bdg}">${pd.n}</span><span class="text-xs font-bold mt-0.5 truncate">${pd.s}</span></div>`;
                    if(ts.length>0) el.innerHTML += `<div class="mt-1 space-y-0.5">${ts.map(t=>`<div class="text-[10px] bg-white/80 px-1 rounded truncate border">${t.title}</div>`).join('')}</div>`;
                    wrp.appendChild(el);
                });
                col.appendChild(wrp); tc.appendChild(col);
            });
            saveAll();
        }

        function drawTasks() {
            const lc = $('list-tabs'); lc.innerHTML = `<button onclick="fltr='all';drawTasks()" class="px-2 py-1 rounded text-[10px] font-bold ${fltr==='all'?'bg-slate-800 text-white':'bg-slate-100'}">すべて</button>`;
            data.lists.forEach(l => lc.innerHTML += `<button onclick="fltr='${l}';drawTasks()" class="px-2 py-1 rounded text-[10px] font-bold ${fltr===l?'bg-slate-800 text-white':'bg-slate-100'}">${l}</button>`);
            
            const list = $('task-list'); list.innerHTML = '';
            $('move-msg').innerHTML = moveId ? `<div class="bg-blue-600 text-white p-2 rounded text-xs font-bold animate-pulse cursor-pointer" onclick="moveId=null;drawAll()">配置先をタップ... [取消]</div>` : '';
            
            const fts = data.tasks.filter(t => !t.pid && !t.done && (fltr==='all' || t.l===fltr));
            $('task-cnt').innerText = fts.length;
            fts.forEach(t => {
                const isM = t.id===moveId;
                list.innerHTML += `<div class="${isM?'bg-blue-50 border-blue-400':'bg-white border-slate-200'} border p-2 rounded text-xs flex gap-2 items-start mb-2"><input type="checkbox" onchange="doneT('${t.id}')" class="mt-0.5"><div class="font-bold flex-1 pt-0.5">${t.title}</div><button onclick="startMove('${t.id}')" class="text-blue-500 p-1"><i class="fa-solid fa-arrow-right-to-bracket"></i></button></div>`;
            });
        }
        function addTask(e) { e.preventDefault(); const v=$('new-task').value; if(v) { data.tasks.unshift({id:'t'+Date.now(), title:v, l:fltr==='all'?'その他':fltr, done:false, pid:null}); $('new-task').value=''; drawAll(); } }
        function doneT(id) { const t=data.tasks.find(x=>x.id===id); if(t) t.done=true; drawAll(); showToast('完了！'); if(!$('detail-modal').classList.contains('hidden')) drawDtlTasks(); }
        function startMove(id) { moveId=id; drawAll(); }
        function assignT(pid) { const t=data.tasks.find(x=>x.id===moveId); if(t) t.pid=pid; moveId=null; drawAll(); showToast('配置しました'); }
        function unassignT(id) { const t=data.tasks.find(x=>x.id===id); if(t) t.pid=null; drawAll(); if(!$('detail-modal').classList.contains('hidden')) drawDtlTasks(); }
        function mockSync() { data.lists.push('同期リスト'); data.tasks.unshift({id:'t'+Date.now(), title:'同期されたタスク', l:'同期リスト', done:false, pid:null}); drawAll(); showToast('Googleタスクを同期しました'); }

        function openDtl(id, d) {
            actPeriod=id; actDay=d;
            const key = `w${cWeek}-${d}-${id}`;
            const p = data.tt[d].find(x=>x.id===id);
            const pd = data.tc[key] ? {...p, ...data.tc[key]} : p;
            
            $('dtl-num').innerText = pd.n; $('dtl-title').innerText = pd.s;
            $('tc-type').value = pd.t; 
            
            // プルダウン生成
            $('tc-subj').innerHTML = data.subjs.map(s => `<option value="${s.n}">${s.n}</option>`).join('');
            $('tc-subj').value = pd.s;
            
            $('tc-form').classList.add('hidden');
            $('detail-modal').classList.remove('hidden');
            drawDtlTasks();
        }
        function drawDtlTasks() {
            const key = `w${cWeek}-${actDay}-${actPeriod}`;
            const ts = data.tasks.filter(t => t.pid===key && !t.done);
            $('dtl-tasks').innerHTML = ts.map(t=>`<div class="flex gap-2 bg-slate-50 p-2 rounded border"><input type="checkbox" onchange="doneT('${t.id}')"><span class="flex-1 text-xs font-bold">${t.title}</span><button onclick="startMove('${t.id}');$('detail-modal').classList.add('hidden')" class="text-blue-600 bg-blue-100 p-1 rounded"><i class="fa-solid fa-arrow-right-to-bracket"></i></button><button onclick="unassignT('${t.id}')" class="text-slate-600 bg-slate-200 p-1 rounded"><i class="fa-solid fa-rotate-left"></i></button></div>`).join('');
        }
        function saveTc() { data.tc[`w${cWeek}-${actDay}-${actPeriod}`] = {t:$('tc-type').value, s:$('tc-subj').value}; drawAll(); $('detail-modal').classList.add('hidden'); }
        function resetTc() { delete data.tc[`w${cWeek}-${actDay}-${actPeriod}`]; drawAll(); $('detail-modal').classList.add('hidden'); }

        function openSubjModal() {
            $('settings-modal').classList.add('hidden'); $('subj-modal').classList.remove('hidden');
            const c = $('subj-list'); c.innerHTML = '';
            data.subjs.forEach(s => c.innerHTML += `<div class="flex gap-2 mb-1 sub-row"><input type="text" value="${s.n}" class="border p-1 text-xs flex-1"><select class="border p-1 text-xs">${pals.map((_,i)=>`<option value="${i}" ${s.c===i?'selected':''}>色${i+1}</option>`).join('')}</select></div>`);
        }
        function addSubj() { $('subj-list').innerHTML += `<div class="flex gap-2 mb-1 sub-row"><input type="text" class="border p-1 text-xs flex-1" placeholder="新科目"><select class="border p-1 text-xs">${pals.map((_,i)=>`<option value="${i}">色${i+1}</option>`).join('')}</select></div>`; }
        function saveSubj() { data.subjs = Array.from(document.querySelectorAll('.sub-row')).map(r=>({n:r.children[0].value, c:parseInt(r.children[1].value)})).filter(x=>x.n); saveAll(); $('subj-modal').classList.add('hidden'); drawAll(); }

        function openBaseModal() {
            $('settings-modal').classList.add('hidden'); $('base-modal').classList.remove('hidden');
            const g = $('base-grid'); g.innerHTML = '';
            days.forEach(d => {
                let h = `<div class="border rounded p-2"><h4 class="text-center text-xs font-bold mb-2">${dayN[d]}</h4>`;
                data.tt[d].forEach(p => {
                    h += `<div class="mb-1 p-1 bg-slate-50 border rounded b-row" data-d="${d}"><div class="text-[10px] text-slate-500">${p.n}</div><select class="w-full text-xs border p-1 mb-1 b-t"><option value="class" ${p.t==='class'?'selected':''}>授業</option><option value="empty" ${p.t==='empty'?'selected':''}>空き</option></select><select class="w-full text-xs border p-1 b-s">${data.subjs.map(s=>`<option value="${s.n}" ${s.n===p.s?'selected':''}>${s.n}</option>`).join('')}</select></div>`;
                });
                g.innerHTML += h + `</div>`;
            });
        }
        function saveBase() { Array.from(document.querySelectorAll('.b-row')).forEach(r => { const d=r.dataset.d, idx=Array.from(r.parentNode.children).indexOf(r)-1; data.tt[d][idx].t = r.querySelector('.b-t').value; data.tt[d][idx].s = r.querySelector('.b-s').value; }); saveAll(); $('base-modal').classList.add('hidden'); drawAll(); }

        function toggleDark() { document.documentElement.classList.toggle('dark'); localStorage.setItem('tn_dark', document.documentElement.classList.contains('dark')); }
        function saveAll() { localStorage.setItem('tn_data', JSON.stringify(data)); }
        function exportData() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], {type:'application/json'})); a.download = 'tn_data.json'; a.click(); showToast('書き出しました'); }
        function importData(e) { const r = new FileReader(); r.onload = (ev) => { data = JSON.parse(ev.target.result); saveAll(); location.reload(); }; r.readAsText(e.target.files[0]); }
        function showToast(msg) { const d = document.createElement('div'); d.className='toast'; d.innerText=msg; document.body.appendChild(d); setTimeout(()=>d.remove(), 3000); }

        window.onload = init;
    </script>
</body>
</html>
