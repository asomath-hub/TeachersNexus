<!DOCTYPE html>
<html lang="ja" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teacher's Nexus - 教員用タスク＆時間割管理</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <!-- Google Fonts Inter & Noto Sans JP -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Google Identity Services (GSI) 認証ライブラリ -->
    <script>
        // デプロイ時のエラーを防ぐためのダミー関数（SDKロード前に呼ばれた場合の保険）
        function onGsiLoad() {
            if (typeof initGoogleIdentity === 'function') {
                initGoogleIdentity();
            } else {
                window.isGsiLoadedEarly = true;
            }
        }
    </script>
    <script src="https://accounts.google.com/gsi/client" onload="onGsiLoad()" async defer></script>
    
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* スムーズなドラッグ＆ドロップ用のビジュアルフィードバック */
        .drag-over {
            border: 2px dashed #3b82f6 !important;
            background-color: #eff6ff !important;
            transform: scale(1.01);
            transition: all 0.2s;
        }
        /* スクロールバーのカスタマイズ */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="h-full overflow-hidden flex flex-col text-slate-800">

    <header class="bg-white border-b border-slate-200 px-6 py-4 flex flex-col gap-3 md:flex-row md:items-center md:justify-between shrink-0 shadow-sm z-10">
        <div class="flex items-center gap-3">
            <div class="bg-emerald-600 text-white p-3 rounded-xl shadow-md shadow-emerald-100 flex items-center justify-center">
                <i class="fa-solid fa-graduation-cap text-2xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-xl text-slate-900 tracking-tight">Teacher's Nexus</h1>
                <p class="text-xs md:text-sm text-slate-500 font-semibold">教員用時間割 ＆ Google ToDo 連携ダッシュボード</p>
            </div>
        </div>

        <!-- 表示モード & 曜日ナビゲーション -->
        <div class="flex items-center gap-4 flex-wrap">
            <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-xl">
                <button onclick="setViewMode('daily')" id="btn-view-daily" class="px-4 py-2 text-xs md:text-sm font-bold rounded-lg transition-all duration-200 bg-white text-slate-800 shadow-sm">日表示</button>
                <button onclick="setViewMode('three-day')" id="btn-view-three-day" class="px-4 py-2 text-xs md:text-sm font-medium rounded-lg transition-all duration-200 text-slate-600 hover:text-slate-900">3日表示</button>
                <button onclick="setViewMode('weekly')" id="btn-view-weekly" class="px-4 py-2 text-xs md:text-sm font-medium rounded-lg transition-all duration-200 text-slate-600 hover:text-slate-900">週表示</button>
            </div>

            <div id="day-nav-container" class="flex items-center gap-1 bg-slate-100 p-1 rounded-xl">
                <button onclick="changeDay('Mon')" id="btn-Mon" class="day-btn px-4 py-2 text-xs md:text-sm font-bold rounded-lg transition-all duration-200 bg-white text-emerald-700 shadow-sm">月</button>
                <button onclick="changeDay('Tue')" id="btn-Tue" class="day-btn px-4 py-2 text-xs md:text-sm font-medium rounded-lg transition-all duration-200 text-slate-600 hover:text-slate-900">火</button>
                <button onclick="changeDay('Wed')" id="btn-Wed" class="day-btn px-4 py-2 text-xs md:text-sm font-medium rounded-lg transition-all duration-200 text-slate-600 hover:text-slate-900">水</button>
                <button onclick="changeDay('Thu')" id="btn-Thu" class="day-btn px-4 py-2 text-xs md:text-sm font-medium rounded-lg transition-all duration-200 text-slate-600 hover:text-slate-900">木</button>
                <button onclick="changeDay('Fri')" id="btn-Fri" class="day-btn px-4 py-2 text-xs md:text-sm font-medium rounded-lg transition-all duration-200 text-slate-600 hover:text-slate-900">金</button>
            </div>
        </div>

        <!-- コントロールメニュー (統合ボタン) -->
        <div class="flex items-center gap-3">
            <div id="sync-status-indicator" class="flex items-center gap-2 bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-lg hidden md:flex">
                <div class="relative flex h-2.5 w-2.5">
                    <span id="sync-ping" class="absolute inline-flex h-full w-full rounded-full bg-slate-400 opacity-75"></span>
                    <span id="sync-dot" class="relative inline-flex rounded-full h-2.5 w-2.5 bg-slate-400"></span>
                </div>
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider" id="sync-status-label">デモモード</span>
            </div>
            <button onclick="openControlMenu()" class="bg-slate-900 hover:bg-slate-800 text-white px-5 py-2.5 rounded-xl text-xs md:text-sm font-bold flex items-center gap-2 shadow-md transition-all">
                <i class="fa-solid fa-sliders"></i> メニュー設定
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden bg-slate-50" id="dashboard-view">
        <!-- 左カラム：Google ToDoリスト -->
        <section class="w-72 border-r border-slate-200 bg-white flex flex-col shrink-0">
            <div class="p-4 border-b border-slate-100 bg-slate-50/50">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-list-check text-blue-600 text-lg"></i>
                        <h2 class="font-bold text-slate-800 text-base">Google ToDo</h2>
                    </div>
                    <span id="unplanned-count" class="bg-blue-50 text-blue-700 text-xs font-bold px-2.5 py-0.5 rounded-full border border-blue-100">0件</span>
                </div>
                
                <form id="new-task-form" onsubmit="handleAddTask(event)" class="flex gap-2">
                    <input type="text" id="new-task-title" required placeholder="タスクを入力..." class="flex-1 bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-400 transition-all">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg font-bold transition-all"><i class="fa-solid fa-plus"></i></button>
                </form>
            </div>

            <div class="px-3 py-2.5 border-b border-slate-100 flex gap-1 overflow-x-auto shrink-0 scrollbar-thin" id="list-tabs-container">
                <!-- タブがJSで動的生成されます -->
            </div>

            <div class="flex-1 overflow-y-auto p-3 space-y-2.5 bg-slate-50/30" id="unplanned-task-list">
                <!-- 未定タスクがJSで動的生成されます -->
            </div>
        </section>

        <!-- 右カラム：時間割 -->
        <section class="flex-1 flex flex-col overflow-hidden">
            <!-- 本日のサマリーバー -->
            <div class="bg-white border-b border-slate-200 px-5 py-3 flex flex-col md:flex-row md:items-center justify-between gap-3 shrink-0">
                <div class="flex items-center flex-wrap gap-4">
                    <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-lg">
                        <button onclick="navigateWeek(-1)" class="w-8 h-8 flex items-center justify-center rounded hover:bg-white text-slate-600 transition-all" title="前の週へ"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                        <select id="week-selector" onchange="selectWeek(this.value)" class="bg-transparent text-sm font-extrabold text-slate-900 outline-none cursor-pointer px-1"></select>
                        <button onclick="navigateWeek(1)" class="w-8 h-8 flex items-center justify-center rounded hover:bg-white text-slate-600 transition-all" title="次の週へ"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-2xl md:text-3xl font-black text-slate-900 tracking-tight leading-none" id="current-day-label">月曜日</span>
                        <span class="text-[11px] md:text-xs font-bold text-slate-500 mt-1" id="day-date-label">4月6日(月)</span>
                    </div>
                </div>
            </div>

            <!-- 時間割スクロール領域 -->
            <div class="flex-1 overflow-y-auto overflow-x-auto p-4 md:p-6" id="timetable-scroll-wrapper">
                <div id="timetable-container" class="w-full">
                    <!-- 時間割グリッドがJSで動的生成されます -->
                </div>
            </div>
        </section>
    </main>

    <!-- 統合コントロールメニュー -->
    <div id="control-menu-modal" class="hidden fixed inset-0 bg-slate-950/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl border border-slate-200 overflow-hidden animate-in fade-in zoom-in duration-200">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <h3 class="font-bold text-slate-900 text-lg flex items-center gap-2"><i class="fa-solid fa-sliders text-slate-600"></i>コントロールメニュー</h3>
                <button onclick="closeControlMenu()" class="text-slate-400 hover:text-slate-700 p-1 rounded-lg"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <div class="p-6 space-y-6">
                <!-- 機能ボタン群 -->
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="exportToCSV()" class="bg-emerald-50 hover:bg-emerald-100 text-emerald-800 border border-emerald-200 p-3 rounded-xl text-sm font-bold flex flex-col items-center justify-center gap-2 transition-all">
                        <i class="fa-solid fa-file-excel text-xl"></i> CSVエクスポート
                    </button>
                    <button onclick="toggleViewState('basic-settings')" class="bg-slate-100 hover:bg-slate-200 text-slate-800 border border-slate-200 p-3 rounded-xl text-sm font-bold flex flex-col items-center justify-center gap-2 transition-all">
                        <i class="fa-solid fa-calendar-week text-xl"></i> 基本時間割の設定
                    </button>
                </div>

                <hr class="border-slate-100">

                <!-- Google 連携エリア -->
                <div class="space-y-3">
                    <h4 class="font-bold text-sm text-slate-800 flex items-center gap-1.5"><i class="fa-brands fa-google text-blue-600"></i> Google ToDo 連携設定</h4>
                    <div>
                        <input type="text" id="settings-client-id" placeholder="Google Client ID を入力..." class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-xs focus:outline-none focus:border-blue-400">
                    </div>
                    
                    <div id="settings-list-select-container" class="hidden">
                        <select id="settings-target-list" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-blue-400">
                            <option value="all">すべてのリストを統合して同期</option>
                        </select>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="startGoogleAuth()" id="btn-google-login" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2.5 rounded-lg transition-all">
                            サインインして接続
                        </button>
                        <button onclick="disconnectGoogle()" id="btn-google-logout" class="hidden flex-1 bg-rose-50 hover:bg-rose-100 text-rose-700 border border-rose-200 text-xs font-bold py-2.5 rounded-lg transition-all">
                            接続を解除
                        </button>
                        <button onclick="manualSyncTrigger()" id="btn-manual-sync" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold px-4 py-2.5 rounded-lg transition-all" title="手動で同期する">
                            <i class="fa-solid fa-arrows-rotate"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 基本時間割設定ビュー (全画面オーバーレイ型) -->
    <section id="basic-settings-view" class="hidden fixed inset-0 z-40 bg-slate-50 flex flex-col">
        <div class="bg-white border-b border-slate-200 px-6 py-4 flex flex-col sm:flex-row sm:items-center justify-between shadow-sm gap-4 shrink-0">
            <div>
                <h2 class="font-black text-xl text-slate-900 flex items-center gap-2"><i class="fa-solid fa-calendar-week text-emerald-600"></i>基本時間割（標準日課）の設定</h2>
                <p class="text-xs text-slate-500 mt-1">ここで設定した科目が、すべての週のデフォルト日課に適用されます。</p>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleViewState('dashboard')" class="text-xs md:text-sm font-bold px-4 py-2.5 bg-slate-100 hover:bg-slate-200 rounded-xl transition-all">キャンセル</button>
                <button onclick="saveBasicTimetable()" class="text-xs md:text-sm font-bold px-5 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl shadow-md transition-all">保存して戻る</button>
            </div>
        </div>
        <div class="flex-1 overflow-auto p-4 md:p-6">
            <div class="flex gap-4 min-w-max pb-10" id="basic-timetable-editor-container">
                <!-- 基本設定エディタが動的生成されます -->
            </div>
        </div>
    </section>

    <!-- 授業詳細モーダル・トースト等は長さを抑えるため最低限のUI構造を保持 -->
    <div id="class-detail-modal" class="hidden fixed inset-0 bg-slate-950/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <!-- 既存のモーダル構造と同じものを保持 (JSで制御) -->
        <div class="bg-white w-full max-w-xl rounded-2xl shadow-xl flex flex-col max-h-[90vh]">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between shrink-0">
                <div>
                    <span class="text-xs font-bold text-emerald-700 bg-emerald-50 px-2.5 py-1 rounded-md" id="modal-period"></span>
                    <h3 class="font-black text-slate-900 text-2xl mt-2" id="modal-title"></h3>
                </div>
                <button onclick="closeModal()" class="text-slate-400 p-2"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6 overflow-y-auto space-y-6 flex-1">
                <!-- 臨時変更エリア -->
                <div class="bg-amber-50 border border-amber-100 p-4 rounded-xl">
                    <label class="block text-xs font-extrabold text-amber-800 mb-2">この週だけ授業変更</label>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <input type="text" id="edit-subject" placeholder="科目" class="bg-white border border-slate-200 rounded-md px-2 py-1.5 text-sm font-bold">
                        <input type="text" id="edit-class" placeholder="クラス" class="bg-white border border-slate-200 rounded-md px-2 py-1.5 text-sm font-bold">
                    </div>
                    <div class="flex justify-between items-center">
                        <button id="btn-reset-change" onclick="resetPeriodChange()" class="hidden text-xs font-bold text-amber-700 hover:underline">基本に戻す</button>
                        <button onclick="savePeriodChange()" class="bg-amber-600 text-white font-bold text-xs px-3 py-1.5 rounded-md ml-auto">一時変更を適用</button>
                    </div>
                </div>
                <!-- 連絡事項 -->
                <div>
                    <label class="block text-sm font-bold text-slate-800 mb-2"><i class="fa-solid fa-bullhorn text-emerald-600"></i> 生徒への連絡事項</label>
                    <div class="flex gap-2 mb-2">
                        <input type="text" id="new-announcement-input" class="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm" placeholder="連絡を追加...">
                        <button onclick="addAnnouncement()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold text-sm">追加</button>
                    </div>
                    <ul class="space-y-2" id="modal-announcement-list"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- トースト -->
    <div id="toast" class="fixed bottom-6 right-6 bg-slate-900 text-white px-6 py-4 rounded-xl shadow-xl flex items-center gap-3 translate-y-20 opacity-0 transition-all duration-300 z-50 pointer-events-none">
        <i class="fa-solid fa-circle-check text-emerald-400"></i>
        <p class="text-sm font-bold" id="toast-message"></p>
    </div>

    <script>
        // --- 状態管理 ---
        let currentDay = 'Mon'; 
        let currentWeek = 1;   
        let selectedFilter = 'all'; 
        let activeModalPeriodId = null; 
        let viewMode = 'daily'; 
        let viewState = 'dashboard'; 

        let googleClientId = localStorage.getItem('tn_google_client_id') || '';
        let googleToken = localStorage.getItem('tn_google_token') || null;
        let googleTargetListId = localStorage.getItem('tn_google_target_list_id') || 'all'; 
        let isGoogleConnected = (googleToken !== null);
        let tokenExpiry = localStorage.getItem('tn_token_expiry') || 0;
        let googleTaskLists = []; 

        const dayNames = { 'Mon': '月曜日', 'Tue': '火曜日', 'Wed': '水曜日', 'Thu': '木曜日', 'Fri': '金曜日' };
        const baseDate = new Date(2026, 3, 6); // 2026年4月6日(月)

        // 日付計算
        function getFormattedDate(weekNum, dayCode) {
            const dayOffsets = { 'Mon': 0, 'Tue': 1, 'Wed': 2, 'Thu': 3, 'Fri': 4 };
            const offsetDays = (weekNum - 1) * 7 + (dayOffsets[dayCode] || 0);
            const targetDate = new Date(baseDate.getTime() + offsetDays * 24 * 60 * 60 * 1000);
            return (targetDate.getMonth() + 1) + '月' + targetDate.getDate() + '日(' + dayNames[dayCode].charAt(0) + ')';
        }

        function getWeekRangeString(weekNum) {
            const startOffset = (weekNum - 1) * 7;
            const sDate = new Date(baseDate.getTime() + startOffset * 24 * 60 * 60 * 1000);
            const eDate = new Date(baseDate.getTime() + (startOffset + 4) * 24 * 60 * 60 * 1000); 
            return '第' + weekNum + '週 (' + (sDate.getMonth()+1) + '月' + sDate.getDate() + '日 〜 ' + (eDate.getMonth()+1) + '月' + eDate.getDate() + '日)';
        }

        // --- カラーパレットシステム (完全なTailwindクラス文字列を使用し、デプロイ時の色落ちを防止) ---
        function getSubjectColors(subjectName, type) {
            if (type === 'empty') return { bg: 'bg-amber-50/20 border-dashed border-amber-200', borderL: 'border-l-4 border-l-amber-400', badge: 'bg-amber-100 text-amber-800 border border-amber-200' };
            if (type === 'afterschool') return { bg: 'bg-indigo-50/10 border-indigo-100', borderL: 'border-l-4 border-l-indigo-500', badge: 'bg-indigo-600 text-white' };

            const palettes = [
                // 0: Blue系 (数学)
                [ { bg: 'bg-blue-50/40 border-blue-100', borderL: 'border-l-4 border-l-blue-500', badge: 'bg-blue-600 text-white' },
                  { bg: 'bg-sky-50/40 border-sky-100', borderL: 'border-l-4 border-l-sky-500', badge: 'bg-sky-600 text-white' },
                  { bg: 'bg-indigo-50/40 border-indigo-100', borderL: 'border-l-4 border-l-indigo-500', badge: 'bg-indigo-600 text-white' } ],
                // 1: Rose系 (国語)
                [ { bg: 'bg-rose-50/40 border-rose-100', borderL: 'border-l-4 border-l-rose-500', badge: 'bg-rose-600 text-white' },
                  { bg: 'bg-pink-50/40 border-pink-100', borderL: 'border-l-4 border-l-pink-500', badge: 'bg-pink-600 text-white' },
                  { bg: 'bg-red-50/40 border-red-100', borderL: 'border-l-4 border-l-red-500', badge: 'bg-red-600 text-white' } ],
                // 2: Emerald系 (英語・体育)
                [ { bg: 'bg-emerald-50/40 border-emerald-100', borderL: 'border-l-4 border-l-emerald-500', badge: 'bg-emerald-600 text-white' },
                  { bg: 'bg-teal-50/40 border-teal-100', borderL: 'border-l-4 border-l-teal-500', badge: 'bg-teal-600 text-white' },
                  { bg: 'bg-cyan-50/40 border-cyan-100', borderL: 'border-l-4 border-l-cyan-500', badge: 'bg-cyan-600 text-white' } ],
                // 3: Amber/Orange系 (理科)
                [ { bg: 'bg-amber-50/40 border-amber-100', borderL: 'border-l-4 border-l-amber-500', badge: 'bg-amber-600 text-white' },
                  { bg: 'bg-orange-50/40 border-orange-100', borderL: 'border-l-4 border-l-orange-500', badge: 'bg-orange-600 text-white' },
                  { bg: 'bg-yellow-50/40 border-yellow-100', borderL: 'border-l-4 border-l-yellow-500', badge: 'bg-yellow-600 text-white' } ],
                // 4: Fuchsia/Purple系 (社会・総合・その他)
                [ { bg: 'bg-fuchsia-50/40 border-fuchsia-100', borderL: 'border-l-4 border-l-fuchsia-500', badge: 'bg-fuchsia-600 text-white' },
                  { bg: 'bg-purple-50/40 border-purple-100', borderL: 'border-l-4 border-l-purple-500', badge: 'bg-purple-600 text-white' },
                  { bg: 'bg-violet-50/40 border-violet-100', borderL: 'border-l-4 border-l-violet-500', badge: 'bg-violet-600 text-white' } ]
            ];

            const name = subjectName || "";
            let baseGroup = 4; 
            if (name.includes('数')) baseGroup = 0;
            else if (name.includes('国')) baseGroup = 1;
            else if (name.includes('英')) baseGroup = 2;
            else if (name.includes('理')) baseGroup = 3;
            else if (name.includes('社')) baseGroup = 4;
            else if (name.includes('体')) baseGroup = 2;
            else if (name.includes('総合') || name.includes('学活')) baseGroup = 4;
            else {
                let h1 = 0;
                for (let i = 0; i < name.length; i++) h1 = name.charCodeAt(i) + ((h1 << 5) - h1);
                baseGroup = Math.abs(h1) % palettes.length;
            }

            // 同系色の中でのバリエーション（例: 数学I と 数学II で色を変える）
            let h2 = 0;
            for (let i = 0; i < name.length; i++) h2 = h2 * 31 + name.charCodeAt(i);
            const varIdx = Math.abs(h2) % palettes[baseGroup].length;

            return palettes[baseGroup][varIdx];
        }

        // --- データ構造 (月曜6限までの基本状態に復元) ---
        let tasks = [];
        let weeklyDetails = {};
        let temporaryChanges = {};

        let timetableData = {

        // --- 初期化と日付ジャンプ機能 ---
        function jumpToToday() {
            const today = new Date();
            const diffTime = today.getTime() - baseDate.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays >= 0 && diffDays < 45 * 7) {
                let week = Math.floor(diffDays / 7) + 1;
                let dayOfWeek = today.getDay(); // 0:Sun, 1:Mon...
                
                if (dayOfWeek === 0 || dayOfWeek === 6) {
                    week = week + 1;
                    currentDay = 'Mon';
                } else {
                    const dayCodes = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                    currentDay = dayCodes[dayOfWeek];
                }
                if (week >= 1 && week <= 45) {
                    currentWeek = week;
                }
            }
        }

        function loadAllData() {
            try {
                const sT = localStorage.getItem('tn_tasks');
                const sW = localStorage.getItem('tn_weeklyDetails');
                const sC = localStorage.getItem('tn_temporaryChanges');
                const sTD = localStorage.getItem('tn_timetableData');

                tasks = sT ? JSON.parse(sT) : [...defaultTasks];
                weeklyDetails = sW ? JSON.parse(sW) : {};
                temporaryChanges = sC ? JSON.parse(sC) : {};
                if (sTD) timetableData = JSON.parse(sTD);
                
                // 先生のブラウザに過去のデータ（6限までのデータ）が保存されている場合、
                // 自動的に全曜日に「7限目」の枠を追加する安全機能
                ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'].forEach(day => {
                    if (timetableData[day] && !timetableData[day].find(p => p.num === '7')) {
                        const afterIndex = timetableData[day].findIndex(p => p.num === '放');
                        if (afterIndex > -1) {
                            timetableData[day].splice(afterIndex, 0, { id: day + '-period-7', num: '7', type: 'empty', subject: '空きコマ', class: '' });
                        }
                    }
                });
            } catch (e) { console.warn("Local storage error:", e); }
        }

        function saveAllData() {
            try {
                localStorage.setItem('tn_tasks', JSON.stringify(tasks));
                localStorage.setItem('tn_weeklyDetails', JSON.stringify(weeklyDetails));
                localStorage.setItem('tn_temporaryChanges', JSON.stringify(temporaryChanges));
                localStorage.setItem('tn_timetableData', JSON.stringify(timetableData));
            } catch (e) {}
        }

        function renderPeriodsList(periods, container, isCompact, dayCode) {
            periods.forEach(p => {
                const key = 'w' + currentWeek + '-' + p.id;
                const d = temporaryChanges[key] ? { ...p, ...temporaryChanges[key] } : p;
                const c = getSubjectColors(d.subject, d.type);

                item.addEventListener('dragover', e => { e.preventDefault(); item.classList.add('drag-over'); });
                item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
                item.addEventListener('drop', e => {

                    const taskId = e.dataTransfer.getData('text/plain');

                });

                const taskCount = tasks.filter(t => t.assignedPeriodId === key && !t.completed).length;

                if (isCompact) {

        async function handleAddTask(e) {
            e.preventDefault();
            const title = document.getElementById('new-task-title').value.trim();
            if (!title) return;
            
            const randomList = '授業準備';
            if (isGoogleConnected) {
                showToast("🔄 Google Tasks に追加中...");
                let targetListId = (googleTargetListId && googleTargetListId !== 'all') ? googleTargetListId : googleTaskLists[0]?.id;
                try {
                    const res = await fetch('https://tasks.googleapis.com/tasks/v1/lists/' + targetListId + '/tasks', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + googleToken, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title: title })
                    });
                    const data = await res.json();
                    tasks.unshift({ id: data.id, title: title, list: randomList, completed: false, assignedPeriodId: null, googleListId: targetListId });
                } catch(err) {
                    tasks.unshift({ id: 't_' + Date.now(), title: title, list: randomList, completed: false, assignedPeriodId: null });
                }
            } else {
                tasks.unshift({ id: 't_' + Date.now(), title: title, list: randomList, completed: false, assignedPeriodId: null });
            }
            
            document.getElementById('new-task-title').value = '';
            saveAllData(); renderDashboard();
        }

        async function toggleTaskComplete(id) {
            const t = tasks.find(x => x.id === id);
            if(t) { 
                t.completed = true; 
                if (isGoogleConnected && t.googleListId && !t.id.startsWith('t_')) {
                    try {
                        await fetch('https://tasks.googleapis.com/tasks/v1/lists/' + t.googleListId + '/tasks/' + t.id, {
                            method: 'PATCH',
                            headers: { 'Authorization': 'Bearer ' + googleToken, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ id: t.id, status: 'completed' })
                        });
                    } catch(err) {}
                }
                saveAllData(); renderDashboard(); showToast("タスク完了！"); 
            }
        }

        function escapeHTML(s) { return s? s.replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]||c)):''; }

        // --- Google API 連携 (本番実装) ---
        let isGsiLoaded = false;
        let tokenClient;
        
        function initGoogleIdentity() {
            isGsiLoaded = true;
            
            const settingsInput = document.getElementById('settings-client-id');
            if (settingsInput && googleClientId) {
                settingsInput.value = googleClientId;
            }

            if (!googleClientId) {
                updateGoogleStatusUI(false);
                return;
            }
            
            if (typeof google === 'undefined' || !google.accounts || !google.accounts.oauth2) {
                return;
            }

            try {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: googleClientId,
                    scope: 'https://www.googleapis.com/auth/tasks',
                    callback: handleTokenResponse,
                });
                
                const now = Date.now();
                if (googleToken && tokenExpiry && now < parseInt(tokenExpiry, 10)) {
                    isGoogleConnected = true;
                    updateGoogleStatusUI(true);
                    fetchGoogleTaskLists();
                } else {
                    if (googleToken) disconnectGoogle(true);
                }
            } catch (err) {
                console.error(err);
            }
        }

        function startGoogleAuth() {
            if (!isGsiLoaded || typeof google === 'undefined') {
                showToast("⚠️ 読み込み中です。少し待ってからお試しください。");
                return;
            }
            const inputId = document.getElementById('settings-client-id').value.trim();
            if (!inputId) {
                showToast("⚠️ クライアントIDを入力してください。");
                return;
            }
            googleClientId = inputId;
            localStorage.setItem('tn_google_client_id', googleClientId);
            
            const selectList = document.getElementById('settings-target-list');
            if(selectList) {
                googleTargetListId = selectList.value;
                localStorage.setItem('tn_google_target_list_id', googleTargetListId);
            }

            try {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: googleClientId,
                    scope: 'https://www.googleapis.com/auth/tasks',
                    callback: handleTokenResponse,
                });
                tokenClient.requestAccessToken({ prompt: 'consent' });
            } catch (err) {
                showToast("⚠️ 認証エラー。IDを確認してください。");
            }
        }

        function handleTokenResponse(response) {
            if (response.error !== undefined) {
                showToast("⚠️ 認証失敗: " + response.error);
                return;
            }
            googleToken = response.access_token;
            const expiryTime = Date.now() + (parseInt(response.expires_in, 10) * 1000);
            localStorage.setItem('tn_google_token', googleToken);
            localStorage.setItem('tn_token_expiry', expiryTime);
            
            isGoogleConnected = true;
            updateGoogleStatusUI(true);
            showToast("🔑 Google Tasks への接続に成功しました！");
            fetchGoogleTaskLists();
        }

        function disconnectGoogle(silent = false) {
            googleToken = null;
            isGoogleConnected = false;
            tokenExpiry = 0;
            localStorage.removeItem('tn_google_token');
            localStorage.removeItem('tn_token_expiry');
            updateGoogleStatusUI(false);
            if (!silent) showToast("🔌 接続を解除しました。");
        }

        function updateGoogleStatusUI(connected) {
            const ind = document.getElementById('sync-status-indicator');
            const lbl = document.getElementById('sync-status-label');
            const loginBtn = document.getElementById('btn-google-login');
            const logoutBtn = document.getElementById('btn-google-logout');
            const listContainer = document.getElementById('settings-list-select-container');
            
            if(ind && lbl) {
                if(connected) { 
                    lbl.innerText = "同期済"; 
                    document.getElementById('sync-dot').className = "relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"; 
                } else { 
                    lbl.innerText = "デモモード"; 
                    document.getElementById('sync-dot').className = "relative inline-flex rounded-full h-2.5 w-2.5 bg-slate-400"; 
                }
            }
            if(loginBtn) loginBtn.classList.toggle('hidden', connected);
            if(logoutBtn) logoutBtn.classList.toggle('hidden', !connected);
            if(listContainer) listContainer.classList.toggle('hidden', !connected);
        }
        
        async function fetchGoogleTaskLists() {
            if (!googleToken) return;
            try {
                const response = await fetch('https://tasks.googleapis.com/tasks/v1/users/@me/lists', {
                    headers: { 'Authorization': 'Bearer ' + googleToken }
                });
                if (response.status === 401) { disconnectGoogle(true); return; }
                const data = await response.json();
                googleTaskLists = data.items || [];
                
                const select = document.getElementById('settings-target-list');
                if (select) {
                    select.innerHTML = '<option value="all">すべてのリストを統合して同期</option>';
                    googleTaskLists.forEach(list => {
                        const opt = document.createElement('option');
                        opt.value = list.id;
                        opt.text = list.title;
                        if (list.id === googleTargetListId) opt.selected = true;
                        select.appendChild(opt);
                    });
                }
                setupTaskTabsAndSync();
            } catch (err) {
                showToast("⚠️ タスクリストの取得に失敗しました。");
            }
        }

        async function setupTaskTabsAndSync() {
            if (googleTaskLists.length === 0) return;
            
            const prevAssignedMap = {};
            tasks.forEach(t => {
                if (t.assignedPeriodId) prevAssignedMap[t.title] = t.assignedPeriodId;
            });

            const newTasks = [];
            const targetLists = (googleTargetListId === 'all' || !googleTargetListId) 
                ? googleTaskLists 
                : googleTaskLists.filter(l => l.id === googleTargetListId);

            for (let list of targetLists) {
                try {
                    const res = await fetch('https://tasks.googleapis.com/tasks/v1/lists/' + list.id + '/tasks?showCompleted=true', {
                        headers: { 'Authorization': 'Bearer ' + googleToken }
                    });
                    const data = await res.json();
                    const googleItems = data.items || [];
                    
                    googleItems.forEach(item => {
                        const assignedId = prevAssignedMap[item.title] || null;
                        const isCompleted = item.status === 'completed';
                        
                        let listCategory = "その他";
                        const title = item.title || "";
                        if (list.title.includes("授業準備") || title.match(/(授業|教材|テスト|プリント|小テスト|印刷|授業準備|ワーク|宿題|回収|検印)/)) {
                            listCategory = "授業準備";
                        } else if (list.title.includes("校務") || title.match(/(校務|分掌|会議|提出|事務|報告|学年|職員|出張|委員会|資料)/)) {
                            listCategory = "校務分掌";
                        } else {
                            listCategory = list.title;
                        }

                        newTasks.push({
                            id: item.id,
                            title: item.title,
                            list: listCategory,
                            completed: isCompleted,
                            assignedPeriodId: assignedId,
                            googleListId: list.id
                        });
                    });
                } catch (e) { console.warn(e); }
            }
            tasks = newTasks;
            saveAllData();
            renderDashboard();
            showToast("🔄 Google Tasks と同期しました！");
        }
        
        function manualSyncTrigger() {
            if (isGoogleConnected) {
                showToast("🔄 Google Tasks と同期中...");
                fetchGoogleTaskLists();
            } else {
                showToast("⚠️ アカウントが接続されていません");
            }
        }
    </script>
</body>
