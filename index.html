<!DOCTYPE html>
<html lang="ja" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher's Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" onload="onGsiLoad()" async defer></script>
</head>
<body class="h-full overflow-hidden flex flex-col text-slate-800">
    <!-- ヘッダー -->
    <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-3">
            <div class="bg-emerald-600 text-white p-2 rounded-lg"><i class="fa-solid fa-graduation-cap"></i></div>
            <h1 class="font-bold text-lg text-slate-900">Teacher's Nexus</h1>
        </div>
        <div class="flex items-center gap-3">
            <div id="sync-status-box" class="flex items-center gap-2 bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-lg">
                <div id="sync-dot" class="w-2.5 h-2.5 rounded-full bg-slate-400"></div>
                <p class="text-[10px] font-bold text-slate-700" id="google-account-text">アカウント未接続</p>
            </div>
            <button onclick="openSyncSettings()" class="bg-slate-900 hover:bg-slate-800 text-white px-4 py-2 rounded-lg text-xs font-bold transition-all">
                <i class="fa-solid fa-sliders"></i> メニュー設定
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- 左：ToDo -->
        <section class="w-72 border-r border-slate-200 bg-white flex flex-col shrink-0">
            <div class="p-4 border-b border-slate-100 flex items-center justify-between">
                <h2 class="font-bold text-sm text-slate-800">Google ToDo</h2>
                <span id="unplanned-count" class="text-[10px] font-bold bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full">0件</span>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-2" id="unplanned-task-list"></div>
        </section>

        <!-- 右：時間割 -->
        <section class="flex-1 flex flex-col overflow-hidden">
            <div class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-4">
                    <select id="week-selector" onchange="selectWeek(this.value)" class="font-black text-lg outline-none cursor-pointer bg-transparent"></select>
                    <div class="flex flex-col">
                        <span class="text-2xl font-black text-slate-900" id="current-day-label">月曜日</span>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="setViewMode('daily')" id="btn-daily" class="px-3 py-1.5 text-xs font-bold rounded-lg bg-slate-100">日</button>
                    <button onclick="setViewMode('three-day')" id="btn-three" class="px-3 py-1.5 text-xs font-bold rounded-lg bg-slate-100">3日</button>
                    <button onclick="setViewMode('weekly')" id="btn-weekly" class="px-3 py-1.5 text-xs font-bold rounded-lg bg-slate-100">週</button>
                </div>
            </div>
            <div class="flex-1 overflow-auto p-6" id="timetable-container"></div>
        </section>
    </main>

    <!-- 設定モーダル -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white w-96 rounded-2xl p-6 shadow-2xl">
            <h3 class="font-bold text-lg mb-4">コントロールメニュー</h3>
            <div class="space-y-3">
                <button onclick="exportToCSV()" class="w-full text-left px-4 py-3 bg-emerald-50 rounded-xl text-sm font-bold text-emerald-700">CSVエクスポート</button>
                <button onclick="toggleViewState('basic-settings')" class="w-full text-left px-4 py-3 bg-slate-50 rounded-xl text-sm font-bold text-slate-700">基本時間割設定</button>
                <hr>
                <input type="text" id="settings-client-id" placeholder="Google Client ID" class="w-full border rounded-lg p-2 text-sm">
                <button onclick="startGoogleAuth()" class="w-full bg-blue-600 text-white py-2 rounded-lg text-sm font-bold">Googleサインイン</button>
            </div>
            <button onclick="closeSettingsModal()" class="w-full mt-4 text-xs text-slate-400 font-bold">閉じる</button>
        </div>
    </div>

        function getSubjectColor(subj) {
            let hash = 0; for(let i=0; i<subj.length; i++) hash = subj.charCodeAt(i) + ((hash<<5)-hash);
            const colors = ['bg-blue-100', 'bg-sky-100', 'bg-indigo-100', 'bg-emerald-100', 'bg-amber-100', 'bg-rose-100', 'bg-purple-100'];
            return colors[Math.abs(hash) % colors.length];
        }

        function renderDashboard() {
            const container = document.getElementById('timetable-container');
            container.innerHTML = '';
            const day = currentDay;
            const col = document.createElement('div');
            col.className = "grid grid-cols-1 gap-2";
            timetableData[day].forEach(p => {
                const color = getSubjectColor(p.subject);
                const el = document.createElement('div');
                el.className = `p-3 rounded-lg border flex gap-3 items-center ${color}`;
                el.innerHTML = `<span class="w-8 font-black text-center text-sm">${p.num}</span>
                                <div class="flex-1"><h4 class="font-black text-lg">${p.subject}</h4>
                                <p class="text-xs font-bold">${p.class}</p></div>`;
                col.appendChild(el);
            });
            container.appendChild(col);
        }

        function generateWeekSelectorOptions() {
            const sel = document.getElementById('week-selector');
            for(let i=1; i<=45; i++) sel.innerHTML += `<option value="${i}">第 ${i} 週</option>`;
        }

        function openSyncSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
        function closeSyncSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
        function startGoogleAuth() { showToast("接続中..."); }
        function showToast(msg) { console.log(msg); }
        function onGsiLoad() { console.log("Google SDK Loaded"); }
        function selectWeek(w) { currentWeek = w; renderDashboard(); }
        function setViewMode(m) { viewMode = m; renderDashboard(); }
        function changeDay(d) { currentDay = d; renderDashboard(); }

        window.onload = () => {
            const now = new Date();
            const day = now.getDay();

            generateWeekSelectorOptions();
            renderDashboard();
        };

</body>
</html>
