<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teacher's Nexus - 時間割＆タスク管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark body { background-color: #0f172a; color: #f1f5f9; }
        .dark .bg-slate-50 { background-color: #1e293b; }
        .dark .bg-white { background-color: #0f172a; }
        .dark .border-slate-200, .dark .border-slate-100 { border-color: #334155; }
        .dark .text-slate-800, .dark .text-slate-900 { color: #f1f5f9; }
        .dark .text-slate-600 { color: #cbd5e1; }
        * { transition: background-color 0.2s, border-color 0.2s; }
        #toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast { background: #1e293b; color: white; padding: 10px 20px; border-radius: 9999px; font-size: 12px; font-weight: bold; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); opacity: 0; animation: fadeInOut 3s forwards; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateY(20px); } 10% { opacity: 1; transform: translateY(0); } 90% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-20px); } }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col overflow-hidden text-slate-800">

    <header class="bg-white border-b border-slate-200 px-3 py-2 flex flex-col items-center justify-center shrink-0 w-full">
        <div class="flex flex-col items-center w-full max-w-4xl">
            <!-- 上段：ロゴとコントロール -->
            <div class="flex items-center justify-center gap-4 h-[40px] w-full">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 text-white w-8 h-8 rounded-lg flex items-center justify-center shadow-sm">
                        <i class="fa-solid fa-chalkboard-user text-sm"></i>
                    </div>
                    <h1 class="font-black text-lg text-slate-800 hidden md:block">Teacher's Nexus</h1>
                </div>
                
                <div class="flex items-center gap-2">
                    <div class="bg-slate-100 p-0.5 rounded-lg flex text-xs font-bold shadow-inner">
                        <button onclick="changeView('daily')" id="btn-view-daily" class="px-3 py-1.5 rounded-md bg-white shadow-sm text-blue-600">日</button>
                        <button onclick="changeView('three-day')" id="btn-view-three-day" class="px-3 py-1.5 rounded-md text-slate-500 hover:text-slate-700">3日</button>
                        <button onclick="changeView('weekly')" id="btn-view-weekly" class="px-3 py-1.5 rounded-md text-slate-500 hover:text-slate-700">週</button>
                    </div>
                    <button onclick="openSettingsModal()" class="bg-slate-800 text-white px-3 py-1.5 rounded-lg font-bold text-xs shadow-sm hover:bg-slate-700">
                        <i class="fa-solid fa-sliders"></i>
                    </button>
                </div>
            </div>
            
            <!-- 下段：日付と曜日ナビ -->
            <div class="flex items-center justify-center gap-4 md:gap-8 h-[36px] mt-1 w-full">
                <div class="flex items-center gap-1">
                    <button onclick="changeWeek(-1)" class="w-7 h-7 flex items-center justify-center text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-full transition-colors"><i class="fa-solid fa-chevron-left"></i></button>
                    <div class="flex flex-col items-center min-w-[80px]">
                        <h2 class="text-base md:text-lg font-black text-slate-900 leading-none" id="current-day-label">月曜日</h2>
                        <span class="text-[10px] font-bold text-slate-500 mt-0.5" id="day-date-label"></span>
                    </div>
                    <button onclick="changeWeek(1)" class="w-7 h-7 flex items-center justify-center text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-full transition-colors"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div id="day-nav-buttons" class="flex gap-1">
                    <button onclick="changeDay('Mon')" id="btn-day-Mon" class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold bg-blue-600 text-white shadow-sm">月</button>
                    <button onclick="changeDay('Tue')" id="btn-day-Tue" class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-slate-500 hover:bg-slate-100">火</button>
                    <button onclick="changeDay('Wed')" id="btn-day-Wed" class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-slate-500 hover:bg-slate-100">水</button>
                    <button onclick="changeDay('Thu')" id="btn-day-Thu" class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-slate-500 hover:bg-slate-100">木</button>
                    <button onclick="changeDay('Fri')" id="btn-day-Fri" class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-slate-500 hover:bg-slate-100">金</button>
                </div>
            </div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <!-- 左カラム：ToDoリスト -->
        <section class="w-64 md:w-72 border-r border-slate-200 bg-white flex flex-col shrink-0">
            <div class="p-3 border-b border-slate-100 bg-slate-50/50">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="font-bold text-slate-800 text-sm md:text-base"><i class="fa-solid fa-list-check text-blue-600 mr-1"></i> 未計画タスク</h2>
                    <div class="flex items-center gap-2">
                        <button onclick="syncTasks()" class="text-blue-500 hover:bg-blue-100 w-6 h-6 rounded flex items-center justify-center transition-colors" title="手動同期">
                            <i class="fa-solid fa-rotate"></i>
                        </button>
                        <span id="unplanned-count" class="bg-blue-50 text-blue-700 text-[10px] font-bold px-2 py-0.5 rounded-full border border-blue-100">0件</span>
                    </div>
                </div>
                <form id="new-task-form" onsubmit="handleAddTask(event)" class="flex gap-1.5">
                    <input type="text" id="new-task-title" required placeholder="タスクを追加..." class="flex-1 bg-white border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500">
                    <button type="submit" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg font-bold text-xs"><i class="fa-solid fa-plus"></i></button>
                </form>
            </div>
            
            <div id="moving-task-message" class="px-3 pt-2 empty:hidden"></div>
            
            <!-- タスクリストのカテゴリ（折り返し表示） -->
            <div class="px-3 py-2 border-b border-slate-100 flex flex-wrap gap-1 shrink-0" id="list-tabs-container">
                <!-- タブがここに生成されます -->
            </div>
            <div class="flex-1 overflow-y-auto p-3 space-y-2" id="unplanned-task-list">
                <!-- タスクがここに生成されます -->
            </div>
        </section>

        <!-- メインカラム：時間割 -->
        <main class="flex-1 bg-slate-50 p-2 md:p-4 overflow-y-auto">
            <div id="timetable-container">
                <!-- 時間割がここに生成されます -->
            </div>
        </main>
    </div>

    <!-- コントロールメニューモーダル -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-slate-950/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-xl flex flex-col max-h-[90vh]">
            <div class="px-5 py-4 border-b border-slate-100 flex justify-between items-center">
                <h3 class="font-black text-slate-800 text-lg"><i class="fa-solid fa-sliders text-slate-500 mr-2"></i>メニュー設定</h3>
                <button onclick="closeSettingsModal()" class="text-slate-400 hover:bg-slate-100 p-2 rounded-lg"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="p-5 overflow-y-auto space-y-6">
                <div>
                    <h4 class="text-sm font-bold text-slate-800 mb-2 border-b pb-1">システム設定</h4>
                    <div class="space-y-2">
                        <button onclick="toggleDarkMode()" class="w-full text-left px-3 py-2 text-sm bg-slate-50 hover:bg-slate-100 rounded-lg font-bold text-slate-700 flex justify-between items-center">
                            <span><i class="fa-solid fa-moon mr-2 text-indigo-500"></i>ダークモード切替</span>
                            <span id="dark-mode-status" class="text-xs text-slate-500">オフ</span>
                        </button>
                        <button onclick="openSubjectSettingsModal()" class="w-full text-left px-3 py-2 text-sm bg-slate-50 hover:bg-slate-100 rounded-lg font-bold text-slate-700">
                            <i class="fa-solid fa-palette mr-2 text-pink-500"></i>科目と色の設定
                        </button>
                        <button onclick="openBaseSettingsModal()" class="w-full text-left px-3 py-2 text-sm bg-slate-50 hover:bg-slate-100 rounded-lg font-bold text-slate-700">
                            <i class="fa-solid fa-calendar-days mr-2 text-blue-500"></i>基本時間割の設定
                        </button>
                        <button onclick="exportCSV()" class="w-full text-left px-3 py-2 text-sm bg-slate-50 hover:bg-slate-100 rounded-lg font-bold text-slate-700">
                            <i class="fa-solid fa-file-csv mr-2 text-green-500"></i>CSVエクスポート
                        </button>
                    </div>
                </div>

                <div>
                    <h4 class="text-sm font-bold text-slate-800 mb-2 border-b pb-1">端末間同期（バックアップ）</h4>
                    <p class="text-[10px] text-slate-500 mb-2">設定をファイルに書き出して、別の端末で読み込むことができます。</p>
                    <div class="flex gap-2">
                        <button onclick="exportSettingsFile()" class="flex-1 bg-slate-800 text-white text-xs font-bold py-2 rounded-lg hover:bg-slate-700">
                            <i class="fa-solid fa-download mr-1"></i>設定を書き出し
                        </button>
                        <label class="flex-1 bg-slate-200 text-slate-700 text-xs font-bold py-2 rounded-lg hover:bg-slate-300 text-center cursor-pointer">
                            <i class="fa-solid fa-upload mr-1"></i>設定を読み込み
                            <input type="file" accept=".json" class="hidden" onchange="importSettingsFile(event)">
                        </label>
                    </div>
                </div>

                <div>
                    <h4 class="text-sm font-bold text-slate-800 mb-2 border-b pb-1">Google ToDo 連携</h4>
                    <div class="bg-blue-50 p-3 rounded-lg border border-blue-100">
                        <div id="sync-status-display" class="text-xs font-bold text-blue-800 mb-2 flex items-center gap-1">
                            <i class="fa-solid fa-circle-xmark text-slate-400"></i> 未接続
                        </div>
                        <input type="text" id="client-id-input" placeholder="Google Client ID" class="w-full border border-blue-200 rounded px-2 py-1.5 text-xs mb-2 bg-white">
                        <button onclick="authenticateGoogle()" class="w-full bg-blue-600 text-white px-3 py-2 rounded-lg font-bold text-xs shadow-sm">
                            <i class="fa-brands fa-google mr-1"></i>サインインして接続
                        </button>
                        
                        <!-- 追加：リスト選択エリア（初期状態は非表示） -->
                        <div id="google-lists-container" class="hidden mt-3 p-2 bg-white border border-blue-200 rounded text-xs space-y-1">
                            <p class="font-bold text-slate-700 mb-1">同期するリストを選択:</p>
                            <label class="flex items-center gap-1"><input type="checkbox" value="教務" class="sync-list-cb" checked> 教務</label>
                            <label class="flex items-center gap-1"><input type="checkbox" value="学年" class="sync-list-cb" checked> 学年</label>
                            <label class="flex items-center gap-1"><input type="checkbox" value="部活" class="sync-list-cb"> 部活</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 科目と色の設定モーダル -->
    <div id="subject-settings-modal" class="hidden fixed inset-0 bg-slate-950/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-xl flex flex-col max-h-[80vh]">
            <div class="px-5 py-4 border-b border-slate-100 flex justify-between items-center">
                <h3 class="font-black text-slate-800 text-lg"><i class="fa-solid fa-palette text-pink-500 mr-2"></i>科目と色の設定</h3>
                <button onclick="closeSubjectSettingsModal()" class="text-slate-400 hover:bg-slate-100 p-2 rounded-lg"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="px-5 py-2 bg-slate-50 text-[10px] text-slate-500 border-b border-slate-200">
                ここで設定した科目は、授業変更時にプルダウンで簡単に選択できるようになります。
            </div>
            <div class="p-5 overflow-y-auto flex-1 bg-slate-50 space-y-2" id="subject-settings-list">
            </div>
            <div class="px-5 py-3 border-t border-slate-100 bg-white flex justify-between gap-2">
                <button onclick="addNewSubject()" class="px-4 py-2 text-sm font-bold text-blue-600 bg-blue-50 rounded-lg hover:bg-blue-100"><i class="fa-solid fa-plus mr-1"></i>追加</button>
                <div class="flex gap-2">
                    <button onclick="closeSubjectSettingsModal()" class="px-4 py-2 text-sm font-bold text-slate-600 bg-slate-100 rounded-lg hover:bg-slate-200">キャンセル</button>
                    <button onclick="saveSubjectSettings()" class="px-4 py-2 text-sm font-bold text-white bg-blue-600 rounded-lg hover:bg-blue-700 shadow-sm">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 授業詳細・変更モーダル -->
    <div id="class-detail-modal" class="hidden fixed inset-0 bg-slate-950/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-xl flex flex-col max-h-[80vh]">
            <div class="px-5 py-4 border-b border-slate-100 flex justify-between items-start">
                <div class="flex-1">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-[10px] font-black text-center w-6 py-0.5 rounded-sm bg-slate-200 text-slate-700" id="modal-period"></span>
                        <button onclick="toggleTempChangeMode()" class="text-[10px] bg-slate-100 text-slate-600 px-2 py-0.5 rounded hover:bg-slate-200"><i class="fa-solid fa-pen-to-square"></i> 今週だけ変更</button>
                    </div>
                    <h3 class="font-black text-slate-900 text-xl leading-tight mt-1" id="modal-title"></h3>
                </div>
                <button onclick="closeModal()" class="p-1 -mt-1 -mr-1 text-slate-400 hover:bg-slate-100 rounded-lg"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <div id="temp-change-form" class="hidden px-5 py-3 bg-amber-50 border-b border-amber-100 space-y-2">
                <p class="text-[10px] font-bold text-amber-800"><i class="fa-solid fa-circle-info mr-1"></i>今週のこのコマのみ授業内容を変更します</p>
                <div class="flex gap-2">
                    <select id="tc-type" class="text-xs border border-amber-200 rounded p-1.5 bg-white">
                        <option value="class">授業</option>
                        <option value="empty">空き</option>
                        <option value="afterschool">放課後等</option>
                    </select>
                    <!-- プルダウンで科目を選択 -->
                    <select id="tc-subject" class="flex-1 text-xs border border-amber-200 rounded p-1.5 bg-white">
                        <!-- 動的生成 -->
                    </select>
                    <input type="text" id="tc-class" placeholder="クラス" class="w-20 text-xs border border-amber-200 rounded p-1.5 bg-white">
                </div>
                <div class="flex gap-2 justify-end pt-1">
                    <button onclick="resetTempChange()" class="text-[10px] font-bold px-2 py-1 text-slate-600 bg-slate-200 rounded hover:bg-slate-300">基本に戻す</button>
                    <button onclick="saveTempChange()" class="text-[10px] font-bold px-3 py-1 text-white bg-amber-600 rounded shadow-sm hover:bg-amber-700">変更を保存</button>
                </div>
            </div>

            <div class="p-5 overflow-y-auto flex-1 space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-800 mb-1 block">連絡事項</label>
                    <div class="flex gap-1 mb-2">
                        <input type="text" id="new-announcement-input" class="flex-1 border rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-emerald-500">
                        <button onclick="addAnnouncement()" class="bg-emerald-600 text-white px-3 py-1.5 rounded text-xs font-bold"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <ul id="modal-announcements" class="space-y-1"></ul>
                </div>
                <hr class="border-slate-100">
                <div>
                    <label class="text-xs font-bold text-slate-800 mb-1 block">この時間のタスク</label>
                    <div id="modal-assigned-tasks" class="space-y-1"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 基本時間割設定モーダル -->
    <div id="base-settings-modal" class="hidden fixed inset-0 bg-slate-950/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-4xl rounded-2xl shadow-xl flex flex-col max-h-[90vh]">
            <div class="px-5 py-4 border-b border-slate-100 flex justify-between items-center">
                <h3 class="font-black text-slate-800 text-lg"><i class="fa-solid fa-calendar-days text-slate-500 mr-2"></i>基本時間割の設定</h3>
                <button onclick="closeBaseSettingsModal()" class="text-slate-400 hover:bg-slate-100 p-2 rounded-lg"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-5 overflow-y-auto flex-1 bg-slate-50">
                <div class="grid grid-cols-1 md:grid-cols-5 gap-3" id="base-settings-grid">
                </div>
            </div>
            <div class="px-5 py-3 border-t border-slate-100 bg-white flex justify-end gap-2">
                <button onclick="closeBaseSettingsModal()" class="px-4 py-2 text-sm font-bold text-slate-600 bg-slate-100 rounded-lg hover:bg-slate-200">キャンセル</button>
                <button onclick="saveBaseSettings()" class="px-4 py-2 text-sm font-bold text-white bg-blue-600 rounded-lg hover:bg-blue-700 shadow-sm">設定を保存</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        const dayNames = { 'Mon':'月曜日', 'Tue':'火曜日', 'Wed':'水曜日', 'Thu':'木曜日', 'Fri':'金曜日' };
        let currentDay = 'Mon'; 
        let currentWeek = 1;   
        let selectedFilter = 'all'; 
        let activeModalPeriodId = null; 
        let viewMode = 'daily'; 
        let activeMovingTaskId = null;
        
        let isDarkMode = localStorage.getItem('tn_dark_mode') === 'true';
        if(isDarkMode) document.documentElement.classList.add('dark');

        let defaultTimetable = {};
        let timetableData = {};
        let tasks = [];
        let temporaryChanges = {};
        let announcements = {};
        let lists = ['その他'];
        
        const colorPalettes = [
            { id: 0, name: '赤系', bg: 'bg-red-50', borderL: 'border-red-400 border-l-4', badge: 'bg-red-200 text-red-800' },
            { id: 1, name: '青系', bg: 'bg-blue-50', borderL: 'border-blue-400 border-l-4', badge: 'bg-blue-200 text-blue-800' },
            { id: 2, name: '緑系', bg: 'bg-emerald-50', borderL: 'border-emerald-400 border-l-4', badge: 'bg-emerald-200 text-emerald-800' },
            { id: 3, name: '紫系', bg: 'bg-purple-50', borderL: 'border-purple-400 border-l-4', badge: 'bg-purple-200 text-purple-800' },
            { id: 4, name: '黄系', bg: 'bg-amber-50', borderL: 'border-amber-400 border-l-4', badge: 'bg-amber-200 text-amber-800' },
            { id: 5, name: 'ピンク系', bg: 'bg-pink-50', borderL: 'border-pink-400 border-l-4', badge: 'bg-pink-200 text-pink-800' },
            { id: 6, name: '水色系', bg: 'bg-cyan-50', borderL: 'border-cyan-400 border-l-4', badge: 'bg-cyan-200 text-cyan-800' },
            { id: 7, name: 'ローズ系', bg: 'bg-rose-50', borderL: 'border-rose-400 border-l-4', badge: 'bg-rose-200 text-rose-800' },
            { id: 8, name: '黄緑系', bg: 'bg-lime-50', borderL: 'border-lime-400 border-l-4', badge: 'bg-lime-200 text-lime-800' },
            { id: 9, name: '藍色系', bg: 'bg-indigo-50', borderL: 'border-indigo-400 border-l-4', badge: 'bg-indigo-200 text-indigo-800' }
        ];

        const defaultSubjectsList = [
            { name: '国語', colorIndex: 0 }, { name: '社会', colorIndex: 4 },
            { name: '数学', colorIndex: 1 }, { name: '理科', colorIndex: 2 },
            { name: '音楽', colorIndex: 6 }, { name: '美術', colorIndex: 3 },
            { name: '体育', colorIndex: 8 }, { name: '技術・家庭', colorIndex: 7 },
            { name: '英語', colorIndex: 5 }, { name: '道徳', colorIndex: 9 },
            { name: '学活', colorIndex: 1 }, { name: '総合', colorIndex: 2 }
        ];

        let subjectsList = [];
        
        function jumpToToday() {
            const now = new Date();
            const startOfYear = new Date(now.getFullYear(), 3, 1);
            const diff = now - startOfYear;
            const weekNum = Math.floor(diff / (1000 * 60 * 60 * 24 * 7)) + 1;
            
            let dayIndex = now.getDay();
            let targetDayStr = 'Mon';
            
            if (dayIndex >= 1 && dayIndex <= 5) {
                const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                targetDayStr = days[dayIndex];
                currentWeek = Math.max(1, weekNum);
            } else {
                targetDayStr = 'Mon';
                currentWeek = Math.max(1, weekNum + 1);
            }
            currentDay = targetDayStr;
        }

        function generateDefaultTimetable() {
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];
            const tt = {};
            days.forEach(d => {
                tt[d] = [];
                for(let i=1; i<=7; i++) {
                    tt[d].push({ id: `p${i}`, num: `${i}`, type: 'empty', subject: '空き', class: '' });
                    if(i === 4) tt[d].push({ id: `p_noon`, num: `昼`, type: 'empty', subject: '昼休み', class: '' });
                }
                tt[d].push({ id: `p_after`, num: `放`, type: 'afterschool', subject: '放課後', class: '' });
            });
            return tt;
        }

        function getSubjectColors(subject, type) {
            if (type === 'empty') return { bg: 'bg-transparent border-dashed', borderL: 'border-slate-300', badge: 'bg-slate-200 text-slate-700' };
            if (type === 'afterschool') return { bg: 'bg-indigo-50 border-solid', borderL: 'border-indigo-200', badge: 'bg-indigo-200 text-indigo-800' };
            
            const found = subjectsList.find(s => s.name === subject);
            if (found) return colorPalettes[found.colorIndex % colorPalettes.length];
            
            let hash = 0;
            for (let i = 0; i < subject.length; i++) hash = subject.charCodeAt(i) + ((hash << 5) - hash);
            return colorPalettes[Math.abs(hash) % colorPalettes.length];
        }

        function loadAllData() {
            try {
                const svd = localStorage.getItem('tn_data');
                if(svd) {
                    const parsed = JSON.parse(svd);
                    timetableData = parsed.timetableData || generateDefaultTimetable();
                    
                    const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];
                    days.forEach(d => {
                        if (timetableData[d] && !timetableData[d].find(p => p.id === 'p7')) {
                            const p7 = { id: `p7`, num: `7`, type: 'empty', subject: '空き', class: '' };
                            const afterIndex = timetableData[d].findIndex(p => p.id === 'p_after');
                            if (afterIndex > -1) timetableData[d].splice(afterIndex, 0, p7);
                            else timetableData[d].push(p7);
                        }
                    });
                    
                    tasks = parsed.tasks || [];
                    lists = parsed.lists || ['その他'];
                    temporaryChanges = parsed.temporaryChanges || {};
                    announcements = parsed.announcements || {};
                    subjectsList = parsed.subjectsList || [...defaultSubjectsList];
                } else {
                    timetableData = generateDefaultTimetable();
                    tasks = [{ id: 't1', title: '【例】数学小テスト印刷', list: 'その他', completed: false, assignedPeriodId: null }];
                    subjectsList = [...defaultSubjectsList];
                }
            } catch(e) {
                timetableData = generateDefaultTimetable();
                subjectsList = [...defaultSubjectsList];
            }
        }

        function saveAllData() {
            localStorage.setItem('tn_data', JSON.stringify({
                timetableData, tasks, lists, temporaryChanges, announcements, subjectsList
            }));
        }

        function init() {
            loadAllData();
            jumpToToday();
            updateDarkModeUI();
            renderLists();
            renderDashboard();
        }

        function getFormattedDate(week, dayStr) {
            return '第' + week + '週 ' + dayNames[dayStr];
        }

        function changeView(v) {
            viewMode = v;
            ['daily', 'three-day', 'weekly'].forEach(id => {
                const btn = document.getElementById('btn-view-' + id);
                btn.className = (v === id) ? "px-3 py-1.5 rounded-md bg-white shadow-sm text-blue-600" : "px-3 py-1.5 rounded-md text-slate-500 hover:text-slate-700";
            });
            const nav = document.getElementById('day-nav-buttons');
            nav.className = v === 'weekly' ? 'flex gap-1 invisible' : 'flex gap-1';
            renderDashboard();
        }

        function changeDay(d) {
            currentDay = d;
            ['Mon','Tue','Wed','Thu','Fri'].forEach(x => {
                const btn = document.getElementById('btn-day-'+x);
                btn.className = (x===d) ? "w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold bg-blue-600 text-white shadow-sm" : "w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-slate-500 hover:bg-slate-100";
            });
            renderDashboard();
        }

        function changeWeek(delta) {
            currentWeek += delta;
            if (currentWeek < 1) currentWeek = 1;
            renderDashboard();
        }

        function get3Days() {
            const days = ['Mon','Tue','Wed','Thu','Fri'];
            let idx = days.indexOf(currentDay);
            if(idx > 2) idx = 2;
            return [days[idx], days[idx+1], days[idx+2]];
        }

        function renderDashboard() {
            const lblDay = document.getElementById('current-day-label');
            const lblDate = document.getElementById('day-date-label');
            if (viewMode === 'daily') {
                lblDay.innerText = dayNames[currentDay];
                lblDate.innerText = getFormattedDate(currentWeek, currentDay);
            } else if (viewMode === 'three-day') {
                lblDay.innerText = '3日表示';
                const d = get3Days();
                lblDate.innerText = getFormattedDate(currentWeek, d[0]) + '〜' + getFormattedDate(currentWeek, d[2]);
            } else {
                lblDay.innerText = '週表示';
                lblDate.innerText = getFormattedDate(currentWeek, 'Mon') + '〜' + getFormattedDate(currentWeek, 'Fri');
            }

            renderUnplannedTasks();

            const tc = document.getElementById('timetable-container');
            tc.innerHTML = '';
            
            if (viewMode === 'daily') {
                tc.className = "flex flex-col space-y-3 max-w-2xl mx-auto";
                renderPeriods(timetableData[currentDay], tc, currentDay);
            } else {
                tc.className = viewMode === 'three-day' ? "grid grid-cols-3 gap-1 md:gap-3" : "grid grid-cols-5 gap-1 md:gap-2";
                const days = viewMode === 'three-day' ? get3Days() : ['Mon','Tue','Wed','Thu','Fri'];
                days.forEach(dc => {
                    const col = document.createElement('div');
                    col.className = "bg-white border border-slate-200 rounded-lg md:rounded-xl p-0.5 md:p-1.5 shadow-sm min-w-0";
                    col.innerHTML = '<h3 class="font-bold text-center mb-1 text-slate-800 text-[11px] md:text-sm">' + dayNames[dc].charAt(0) + '</h3>';
                    const wrap = document.createElement('div');
                    wrap.className = "space-y-1 md:space-y-1.5";
                    renderPeriods(timetableData[dc], wrap, dc);
                    col.appendChild(wrap);
                    tc.appendChild(col);
                });
            }
        }

        function renderPeriods(periods, container, dc) {
            periods.forEach(p => {
                const key = 'w' + currentWeek + '-' + dc + '-' + p.id;
                const d = (temporaryChanges[key]) ? {...p, ...temporaryChanges[key]} : p;
                const colors = getSubjectColors(d.subject, d.type);
                
                let hClass = "min-h-[88px]";
                if(d.num==='昼') hClass = "min-h-[32px] py-0.5";
                else if(d.num==='放') hClass = "min-h-[65px]";

                const el = document.createElement('div');
                
                if (activeMovingTaskId) {
                    el.className = colors.bg + " border " + colors.borderL + " rounded-lg p-1 md:px-2 md:py-1.5 flex flex-col justify-between cursor-pointer " + hClass + " shadow-sm relative ring-2 ring-blue-500 ring-offset-1 animate-pulse hover:bg-blue-100 transition-colors";
                } else {
                    el.className = colors.bg + " border " + colors.borderL + " rounded-lg p-1 md:px-2 md:py-1.5 flex flex-col justify-between cursor-pointer " + hClass + " shadow-sm relative group hover:brightness-95 transition-all";
                }
                
                el.onclick = () => {
                    if (activeMovingTaskId) assignTaskToPeriod(key);
                    else openClassDetail(p.id, dc);
                };

                let badge = '<span class="inline-block px-1 w-6 py-0.5 text-center text-[10px] font-black rounded-sm ' + colors.badge + '">' + d.num + '</span>';
                
                let tHtml = '';
                const ts = tasks.filter(t => t.assignedPeriodId === key && !t.completed);
                if(ts.length > 0) {
                    tHtml = '<div class="mt-1 space-y-0.5">' + ts.map(t => '<div class="text-[10px] bg-white/80 px-1 py-0.5 rounded truncate border border-slate-100 font-bold">' + escapeHTML(t.title) + '</div>').join('') + '</div>';
                }

                if(d.type==='empty') {
                    el.innerHTML = '<div class="flex gap-1 md:gap-1.5">' + badge + '<span class="text-[12px] md:text-[14px] font-extrabold opacity-60 text-slate-500 truncate mt-0.5">' + escapeHTML(d.subject) + '</span></div>' + tHtml;
                } else if(d.type==='afterschool') {
                    el.innerHTML = '<div class="flex gap-1 md:gap-1.5">' + badge + '<span class="text-[12px] md:text-[14px] font-extrabold text-indigo-900 truncate mt-0.5">' + escapeHTML(d.subject) + '</span></div>' + tHtml;
                } else {
                    el.innerHTML = [
                        '<div class="flex flex-col gap-0.5">',
                        '  <div class="flex gap-1 md:gap-1.5">',
                        badge,
                        '    <span class="text-[13px] md:text-[14px] font-extrabold text-slate-900 truncate mt-0.5">' + escapeHTML(d.subject) + '</span>',
                        '  </div>',
                        d.class ? '  <div class="text-[10px] font-bold text-slate-600 truncate ml-7">' + escapeHTML(d.class) + '</div>' : '',
                        '</div>', tHtml
                    ].join('');
                }
                container.appendChild(el);
            });
        }

        function renderLists() {
            const lc = document.getElementById('list-tabs-container');
            lc.innerHTML = '';
            
            const btnAll = document.createElement('button');
            btnAll.className = "px-3 py-1 rounded-full text-[10px] font-bold shrink-0 " + (selectedFilter==='all' ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600');
            btnAll.innerText = "すべて";
            btnAll.onclick = () => filterTasks('all');
            lc.appendChild(btnAll);

            lists.forEach(l => {
                const btn = document.createElement('button');
                btn.className = "px-3 py-1 rounded-full text-[10px] font-bold shrink-0 " + (selectedFilter===l ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600');
                btn.innerText = l;
                btn.onclick = () => filterTasks(l);
                lc.appendChild(btn);
            });
        }
        
        function filterTasks(cat) { selectedFilter = cat; renderLists(); renderUnplannedTasks(); }
        
        function renderUnplannedTasks() {
            const lc = document.getElementById('unplanned-task-list');
            lc.innerHTML = '';
            document.getElementById('unplanned-count').innerText = tasks.filter(t=>!t.assignedPeriodId && !t.completed).length + '件';

            const movingMsg = document.getElementById('moving-task-message');
            if(activeMovingTaskId) {
                movingMsg.innerHTML = '<div class="bg-blue-600 text-white p-2.5 rounded-xl text-xs font-bold shadow-md flex justify-between items-center animate-pulse cursor-pointer" onclick="cancelMoveTask()"><span class="truncate pr-2">配置先コマをタップ...</span><button class="bg-blue-800 px-3 py-1 rounded-lg shrink-0 text-[10px]">キャンセル</button></div>';
            } else {
                movingMsg.innerHTML = '';
            }

            const ft = tasks.filter(t => (!t.assignedPeriodId && !t.completed && (selectedFilter==='all' || t.list===selectedFilter)));
            ft.forEach(t => {
                const isMoving = t.id === activeMovingTaskId;
                const d = document.createElement('div');
                d.onclick = (e) => {
                    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON' && !e.target.closest('button')) {
                        if (activeMovingTaskId) cancelMoveTask();
                    }
                };
                
                d.className = isMoving ? "bg-blue-50 border-2 border-blue-400 p-2.5 rounded-lg shadow-sm text-xs flex gap-2 items-start" : "bg-white border border-slate-200 p-2.5 rounded-lg shadow-sm text-xs flex gap-2 items-start hover:border-blue-300 transition-colors cursor-pointer";
                d.innerHTML = '<input type="checkbox" onchange="toggleTask(\''+t.id+'\')" class="mt-0.5"><div class="font-bold flex-1 text-slate-700 leading-tight pt-0.5">' + escapeHTML(t.title) + '</div><button onclick="startMoveTask(\''+t.id+'\')" class="text-blue-500 hover:bg-blue-100 p-1.5 rounded-lg transition-colors shrink-0" title="配置・移動"><i class="fa-solid fa-arrow-right-to-bracket text-sm"></i></button>';
                lc.appendChild(d);
            });
        }
        
        function startMoveTask(id) { activeMovingTaskId = id; renderDashboard(); showToast('配置したいコマをタップしてください'); }
        function cancelMoveTask() { activeMovingTaskId = null; renderDashboard(); }
        
        function assignTaskToPeriod(periodKey) {
            const t = tasks.find(x=>x.id===activeMovingTaskId);
            if(t) t.assignedPeriodId = periodKey;
            activeMovingTaskId = null;
            saveAllData(); renderDashboard(); showToast('タスクを配置しました');
        }
        
        function returnTaskToUnplanned(id) {
            const t = tasks.find(x=>x.id===id);
            if(t) { 
                t.assignedPeriodId = null; 
                if (activeMovingTaskId === id) activeMovingTaskId = null;
                saveAllData(); renderDashboard(); 
                if (!document.getElementById('class-detail-modal').classList.contains('hidden')) renderModalTasks();
                showToast('未計画に戻しました'); 
            }
        }

        function handleAddTask(e) {
            e.preventDefault();
            const val = document.getElementById('new-task-title').value.trim();
            const list = selectedFilter === 'all' ? (lists[0] || 'その他') : selectedFilter;
            if(val) { 
                tasks.unshift({ id:'t_'+Date.now(), title:val, list:list, completed:false, assignedPeriodId:null }); 
                saveAllData(); renderDashboard(); document.getElementById('new-task-title').value=''; 
            }
        }

        function toggleTask(id) {
            const t = tasks.find(x=>x.id===id);
            if(t) { 
                t.completed = true; 
                saveAllData(); renderDashboard(); 
                if (!document.getElementById('class-detail-modal').classList.contains('hidden')) renderModalTasks();
                showToast('タスク完了！'); 
            }
        }

        let activeModalDayStr = null;

        function openClassDetail(id, dayStr) {
            activeModalPeriodId = id;
            activeModalDayStr = dayStr;
            
            document.getElementById('class-detail-modal').classList.remove('hidden');
            document.getElementById('temp-change-form').classList.add('hidden');
            
            const key = 'w' + currentWeek + '-' + dayStr + '-' + id;
            const p = timetableData[dayStr].find(x=>x.id===id);
            const d = temporaryChanges[key] ? {...p, ...temporaryChanges[key]} : p;
            
            document.getElementById('modal-period').innerText = d.num;
            document.getElementById('modal-title').innerText = escapeHTML(d.subject) + (d.class ? ' ('+escapeHTML(d.class)+')' : '');
            document.getElementById('tc-type').value = d.type;
            
            const subjectSelect = document.getElementById('tc-subject');
            let opts = '<option value="">(未設定)</option>';
            subjectsList.forEach(s => {
                opts += `<option value="${escapeHTML(s.name)}" ${s.name === d.subject ? 'selected' : ''}>${escapeHTML(s.name)}</option>`;
            });
            if (d.subject && !subjectsList.find(s => s.name === d.subject)) {
                opts += `<option value="${escapeHTML(d.subject)}" selected>${escapeHTML(d.subject)}</option>`;
            }
            subjectSelect.innerHTML = opts;

            document.getElementById('tc-class').value = d.class || '';

            renderAnnouncements();
            renderModalTasks();
        }

        function closeModal() { 
            document.getElementById('class-detail-modal').classList.add('hidden'); 
            activeModalPeriodId = null; activeModalDayStr = null;
        }
        
        function renderModalTasks() {
            const key = 'w'+currentWeek+'-'+activeModalDayStr+'-'+activeModalPeriodId;
            const ts = tasks.filter(t => t.assignedPeriodId === key && !t.completed);
            const container = document.getElementById('modal-assigned-tasks');
            if(ts.length === 0) {
                container.innerHTML = '<p class="text-[10px] text-slate-400 bg-slate-50 p-2 rounded border border-dashed border-slate-200">この時間のタスクはありません</p>';
                return;
            }
            container.innerHTML = ts.map(t => `
                <div class="flex items-start gap-2 bg-slate-50 p-2.5 rounded-lg border border-slate-200 shadow-sm">
                    <input type="checkbox" onchange="toggleTask('${t.id}')" class="mt-0.5 cursor-pointer">
                    <span class="flex-1 text-xs font-bold text-slate-800 leading-tight">${escapeHTML(t.title)}</span>
                    <div class="flex gap-1 shrink-0">
                        <button onclick="startMoveTask('${t.id}'); closeModal()" class="text-blue-600 bg-blue-100 p-1.5 rounded-lg hover:bg-blue-200" title="別のコマへ移動"><i class="fa-solid fa-arrow-right-to-bracket"></i></button>
                        <button onclick="returnTaskToUnplanned('${t.id}')" class="text-slate-600 bg-slate-200 p-1.5 rounded-lg hover:bg-slate-300" title="未計画に戻す"><i class="fa-solid fa-rotate-left"></i></button>
                    </div>
                </div>
            `).join('');
        }
        
        function toggleTempChangeMode() { document.getElementById('temp-change-form').classList.toggle('hidden'); }
        
        function saveTempChange() {
            const key = 'w' + currentWeek + '-' + activeModalDayStr + '-' + activeModalPeriodId;
            temporaryChanges[key] = {
                type: document.getElementById('tc-type').value,
                subject: document.getElementById('tc-subject').value,
                class: document.getElementById('tc-class').value
            };
            saveAllData(); toggleTempChangeMode(); openClassDetail(activeModalPeriodId, activeModalDayStr); renderDashboard(); showToast('今週の変更を保存しました');
        }
        
        function resetTempChange() {
            const key = 'w' + currentWeek + '-' + activeModalDayStr + '-' + activeModalPeriodId;
            delete temporaryChanges[key];
            saveAllData(); toggleTempChangeMode(); openClassDetail(activeModalPeriodId, activeModalDayStr); renderDashboard(); showToast('基本の時間割に戻しました');
        }

        function renderAnnouncements() {
            const key = 'w' + currentWeek + '-' + activeModalDayStr + '-' + activeModalPeriodId;
            const al = announcements[key] || [];
            const ul = document.getElementById('modal-announcements');
            ul.innerHTML = al.map((a, i) => `
                <li class="text-xs bg-slate-50 border border-slate-200 rounded p-2 flex justify-between items-center group">
                    <span class="text-slate-700">${escapeHTML(a)}</span>
                    <button onclick="deleteAnnouncement(${i})" class="text-red-500 opacity-0 group-hover:opacity-100 p-1"><i class="fa-solid fa-trash"></i></button>
                </li>
            `).join('');
        }

        function addAnnouncement() {
            const val = document.getElementById('new-announcement-input').value.trim();
            if(!val) return;
            const key = 'w' + currentWeek + '-' + activeModalDayStr + '-' + activeModalPeriodId;
            if(!announcements[key]) announcements[key] = [];
            announcements[key].push(val);
            saveAllData(); renderAnnouncements(); document.getElementById('new-announcement-input').value='';
        }
        
        function deleteAnnouncement(idx) {
            const key = 'w' + currentWeek + '-' + activeModalDayStr + '-' + activeModalPeriodId;
            announcements[key].splice(idx, 1);
            saveAllData(); renderAnnouncements();
        }

        function openSettingsModal() { document.getElementById('settings-modal').classList.remove('hidden'); }
        function closeSettingsModal() { document.getElementById('settings-modal').classList.add('hidden'); }

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            if(isDarkMode) {
                document.documentElement.classList.add('dark');
                localStorage.setItem('tn_dark_mode', 'true');
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('tn_dark_mode', 'false');
            }
            updateDarkModeUI();
        }

        function updateDarkModeUI() {
            const st = document.getElementById('dark-mode-status');
            if(st) st.innerText = isDarkMode ? 'オン' : 'オフ';
        }

        function openSubjectSettingsModal() {
            closeSettingsModal(); renderSubjectSettingsList();
            document.getElementById('subject-settings-modal').classList.remove('hidden');
        }

        function closeSubjectSettingsModal() { document.getElementById('subject-settings-modal').classList.add('hidden'); }

        function renderSubjectSettingsList() {
            const container = document.getElementById('subject-settings-list');
            container.innerHTML = '';
            subjectsList.forEach((sub) => container.appendChild(createSubjectRow(sub.name, sub.colorIndex)));
        }

        function createSubjectRow(name, colorIndex) {
            const row = document.createElement('div');
            row.className = "flex gap-2 items-center bg-white p-2 rounded-lg border border-slate-200 shadow-sm subject-row";
            let colorOptions = colorPalettes.map(c => `<option value="${c.id}" ${c.id === colorIndex ? 'selected' : ''}>${c.name}</option>`).join('');
            row.innerHTML = `
                <input type="text" class="flex-1 text-xs border border-slate-200 rounded p-1.5 font-bold ss-name focus:ring-1 focus:ring-blue-500" value="${escapeHTML(name)}" placeholder="科目名">
                <select class="w-24 text-xs border border-slate-200 rounded p-1.5 ss-color bg-slate-50 focus:ring-1 focus:ring-blue-500">${colorOptions}</select>
                <button onclick="this.parentElement.remove()" class="text-red-500 hover:bg-red-50 p-1.5 rounded"><i class="fa-solid fa-trash"></i></button>
            `;
            return row;
        }

        function addNewSubject() {
            const container = document.getElementById('subject-settings-list');
            const newRow = createSubjectRow('', 0);
            container.appendChild(newRow);
            container.scrollTop = container.scrollHeight;
        }

        function saveSubjectSettings() {
            const rows = document.querySelectorAll('#subject-settings-list .subject-row');
            const newList = [];
            rows.forEach(row => {
                const name = row.querySelector('.ss-name').value.trim();
                const colorIndex = parseInt(row.querySelector('.ss-color').value, 10);
                if (name) newList.push({ name, colorIndex });
            });
            subjectsList = newList;
            saveAllData(); closeSubjectSettingsModal(); renderDashboard(); showToast('科目設定を保存しました');
        }

        function openBaseSettingsModal() {
            closeSettingsModal();
            const g = document.getElementById('base-settings-grid');
            g.innerHTML = '';
            ['Mon','Tue','Wed','Thu','Fri'].forEach(d => {
                const col = document.createElement('div');
                col.className = 'border border-slate-200 rounded-lg p-2 bg-white';
                col.innerHTML = `<h4 class="font-bold text-center text-sm mb-2">${dayNames[d]}</h4>`;
                
                let subjectOptionsHTML = '<option value="">(未設定)</option>' + subjectsList.map(s => `<option value="${escapeHTML(s.name)}">${escapeHTML(s.name)}</option>`).join('');
                
                timetableData[d].forEach(p => {
                    let sOpts = subjectOptionsHTML;
                    if (p.subject && !subjectsList.find(s => s.name === p.subject)) {
                        sOpts += `<option value="${escapeHTML(p.subject)}">${escapeHTML(p.subject)}</option>`;
                    }
                    
                    col.innerHTML += `
                        <div class="mb-2 p-1 border border-slate-100 rounded bg-slate-50" data-id="${p.id}" data-day="${d}">
                            <div class="text-[10px] font-bold text-slate-500 mb-1">${p.num}限</div>
                            <select class="w-full text-xs border rounded p-1 mb-1 bs-type bg-white">
                                <option value="class" ${p.type==='class'?'selected':''}>授業</option>
                                <option value="empty" ${p.type==='empty'?'selected':''}>空き</option>
                                <option value="afterschool" ${p.type==='afterschool'?'selected':''}>放課後</option>
                            </select>
                            <select class="w-full text-xs border rounded p-1 mb-1 bs-subject bg-white">
                                ${sOpts.replace(`value="${escapeHTML(p.subject)}"`, `value="${escapeHTML(p.subject)}" selected`)}
                            </select>
                            <input type="text" class="w-full text-xs border rounded p-1 bs-class bg-white" placeholder="クラス" value="${escapeHTML(p.class||'')}">
                        </div>
                    `;
                });
                g.appendChild(col);
            });
            document.getElementById('base-settings-modal').classList.remove('hidden');
        }

        function closeBaseSettingsModal() { document.getElementById('base-settings-modal').classList.add('hidden'); }

        function saveBaseSettings() {
            ['Mon','Tue','Wed','Thu','Fri'].forEach(d => {
                const divs = document.querySelectorAll(`#base-settings-grid div[data-day="${d}"]`);
                divs.forEach((div, i) => {
                    timetableData[d][i].type = div.querySelector('.bs-type').value;
                    timetableData[d][i].subject = div.querySelector('.bs-subject').value;
                    timetableData[d][i].class = div.querySelector('.bs-class').value;
                });
            });
            saveAllData(); closeBaseSettingsModal(); renderDashboard(); showToast('基本時間割を保存しました');
        }

        function exportCSV() {
            let csv = "曜日,時限,種類,科目,クラス\n";
            ['Mon','Tue','Wed','Thu','Fri'].forEach(d => {
                timetableData[d].forEach(p => csv += `${dayNames[d]},${p.num},${p.type},${p.subject},${p.class||''}\n`);
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url); link.setAttribute("download", "timetable.csv");
            link.style.visibility = 'hidden'; document.body.appendChild(link);
            link.click(); document.body.removeChild(link); closeSettingsModal();
        }

        function exportSettingsFile() {
            const dataStr = JSON.stringify({ timetableData, tasks, lists, temporaryChanges, announcements, subjectsList });
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'teachers-nexus-backup.json';
            a.click(); URL.revokeObjectURL(url); showToast('設定ファイルをダウンロードしました');
        }

        function importSettingsFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if(parsed.timetableData) {
                        localStorage.setItem('tn_data', JSON.stringify(parsed));
                        showToast('設定を読み込みました。リロードします...');
                        setTimeout(() => location.reload(), 1500);
                    } else alert('無効なファイル形式です');
                } catch(err) { alert('ファイルの読み込みに失敗しました'); }
            };
            reader.readAsText(file);
        }

function authenticateGoogle() {
            const display = document.getElementById('sync-status-display');
            display.innerHTML = '<i class="fa-solid fa-circle-check text-green-500"></i> 同期済み';
            
            // リスト選択エリアを表示する
            const listContainer = document.getElementById('google-lists-container');
            if(listContainer) listContainer.classList.remove('hidden');
            
            showToast('Google ToDoと接続しました');
        }

        function syncTasks() {
            // チェックされたリストを取得
            const checkboxes = document.querySelectorAll('.sync-list-cb:checked');
            let addedCount = 0;
            
            checkboxes.forEach(cb => {
                const listName = cb.value;
                // タブ（リスト）に存在しなければ追加
                if (!lists.includes(listName)) {
                    lists.push(listName);
                }
                
                // ダミーのタスクを生成して追加
                const dummyTaskName = `【同期】${listName}のタスク ` + Math.floor(Math.random() * 100);
                tasks.unshift({ 
                    id: 't_g_' + Date.now() + Math.random(), 
                    title: dummyTaskName, 
                    list: listName, 
                    completed: false, 
                    assignedPeriodId: null 
                });
                addedCount++;
            });

            if (addedCount > 0) {
                saveAllData();
                renderLists();
                renderDashboard();
                showToast(`${addedCount}件のタスクを同期しました`);
            } else {
                showToast('同期するリストが選択されていません');
            }
        }
            const checkboxes = document.querySelectorAll('#google-lists-selection input[type="checkbox"]:checked');
            checkboxes.forEach(cb => {
                if (!lists.includes(cb.value)) {
                    lists.push(cb.value);
                }
            });
            saveAllData();
            renderLists();
            showToast('タスクとリストを同期しました');
        }
        function escapeHTML(str) { return str.replace(/[&<>'"]/g, tag => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[tag])); }
        
        function showToast(msg) {
            const c = document.getElementById('toast-container');
            const d = document.createElement('div');
            d.className = 'toast'; d.innerText = msg;
            c.appendChild(d);
            setTimeout(() => { if(c.contains(d)) c.removeChild(d); }, 3000);
        }

        window.onload = init;
    </script>
</body>
