<!DOCTYPE html>
<html lang="ja" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teacher's Nexus - 教員用タスク＆時間割管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+JP:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script>
        function onGsiLoad() { window.isGsiLoadedEarly = true; }
    </script>
    <script src="https://accounts.google.com/gsi/client" onload="onGsiLoad()" async defer></script>
    <style>
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
        .drag-over { border: 2px dashed #3b82f6 !important; background-color: #eff6ff !important; transform: scale(1.01); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* ダークモード時の安全なカラーオーバーライド */
        html.dark { background-color: #0f172a; color: #f8fafc; }
        html.dark body { background-color: #0f172a; color: #f8fafc; }
        html.dark .bg-slate-50 { background-color: #0f172a !important; border-color: #1e293b !important; }
        html.dark .bg-white { background-color: #1e293b !important; border-color: #334155 !important; }
        html.dark .bg-slate-100 { background-color: #334155 !important; }
        html.dark .text-slate-900 { color: #f8fafc !important; }
        html.dark .text-slate-800 { color: #e2e8f0 !important; }
        html.dark .text-slate-700 { color: #cbd5e1 !important; }
        html.dark .text-slate-600 { color: #94a3b8 !important; }
        html.dark .border-slate-200 { border-color: #334155 !important; }
        html.dark .border-slate-100 { border-color: #1e293b !important; }
        html.dark .bg-slate-950\/40 { background-color: rgba(0, 0, 0, 0.7) !important; }
        
        /* ダークモード用科目パレットトーン調整 */
        html.dark .bg-blue-50\/40 { background-color: rgba(59,130,246,0.15)!important; border-color: rgba(59,130,246,0.3)!important; }
        html.dark .bg-rose-50\/40 { background-color: rgba(244,63,94,0.15)!important; border-color: rgba(244,63,94,0.3)!important; }
        html.dark .bg-emerald-50\/40 { background-color: rgba(16,185,129,0.15)!important; border-color: rgba(16,185,129,0.3)!important; }
        html.dark .bg-amber-50\/40 { background-color: rgba(245,158,11,0.15)!important; border-color: rgba(245,158,11,0.3)!important; }
        html.dark .bg-purple-50\/40 { background-color: rgba(168,85,247,0.15)!important; border-color: rgba(168,85,247,0.3)!important; }
        html.dark .bg-cyan-50\/40 { background-color: rgba(6,182,212,0.15)!important; border-color: rgba(6,182,212,0.3)!important; }
        html.dark .bg-orange-50\/40 { background-color: rgba(249,115,22,0.15)!important; border-color: rgba(249,115,22,0.3)!important; }
        html.dark .bg-pink-50\/40 { background-color: rgba(236,72,153,0.15)!important; border-color: rgba(236,72,153,0.3)!important; }
        html.dark .bg-teal-50\/40 { background-color: rgba(20,184,166,0.15)!important; border-color: rgba(20,184,166,0.3)!important; }
        html.dark .bg-fuchsia-50\/40 { background-color: rgba(217,70,239,0.15)!important; border-color: rgba(217,70,239,0.3)!important; }
        html.dark .bg-amber-50\/20 { background-color: rgba(245,158,11,0.05)!important; border-color: rgba(245,158,11,0.2)!important; }
        html.dark .bg-indigo-50\/10 { background-color: rgba(99,102,241,0.1)!important; border-color: rgba(99,102,241,0.3)!important; }
    </style>
</head>
<body class="h-full overflow-hidden flex flex-col text-slate-800 transition-colors duration-300">

    <!-- 高さ固定の安定ヘッダー -->
    <header class="bg-white border-b border-slate-200 px-4 md:px-6 py-3 flex flex-col shrink-0 shadow-sm z-10 h-[105px] md:h-[100px] justify-between">
        <!-- 上段：ロゴとメニューボタン -->
        <div class="flex items-center justify-between w-full">
            <div class="flex items-center gap-2 md:gap-3">
                <div class="bg-emerald-600 text-white p-2 md:p-2.5 rounded-xl shadow-md flex items-center justify-center">
                    <i class="fa-solid fa-graduation-cap text-xl md:text-2xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg md:text-xl text-slate-900 tracking-tight">Teacher's Nexus</h1>
                    <p class="text-[10px] md:text-xs text-slate-500 font-semibold">教員用時間割＆タスク管理</p>
                </div>
            </div>
            <!-- コントロールメニュー呼び出し -->
            <button onclick="openSettingsModal()" class="bg-slate-900 hover:bg-slate-800 text-white px-3 md:px-4 py-2 rounded-xl text-xs md:text-sm font-semibold flex items-center gap-1.5 shadow-md transition-all">
                <i class="fa-solid fa-sliders"></i> メニュー設定
            </button>
        </div>

        <!-- 下段：表示切り替えナビゲーション -->
        <div class="flex items-center gap-2 md:gap-4 w-full mt-1.5">
            <div class="flex items-center bg-slate-100 p-1 rounded-xl shrink-0">
                <button onclick="setViewMode('daily')" id="btn-view-daily" class="px-3 py-1.5 text-xs md:text-sm font-bold rounded-lg transition-all bg-white text-slate-900 shadow-sm">日表示</button>
                <button onclick="setViewMode('three-day')" id="btn-view-three-day" class="px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg transition-all text-slate-600">3日表示</button>
                <button onclick="setViewMode('weekly')" id="btn-view-weekly" class="px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg transition-all text-slate-600">週表示</button>
            </div>
            <div id="day-nav-container" class="flex items-center bg-slate-100 p-1 rounded-xl transition-opacity duration-200">
                <button onclick="changeDay('Mon')" id="btn-Mon" class="day-btn px-3 py-1.5 text-xs md:text-sm font-bold rounded-lg transition-all bg-white text-emerald-700 shadow-sm">月</button>
                <button onclick="changeDay('Tue')" id="btn-Tue" class="day-btn px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg transition-all text-slate-600">火</button>
                <button onclick="changeDay('Wed')" id="btn-Wed" class="day-btn px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg transition-all text-slate-600">水</button>
                <button onclick="changeDay('Thu')" id="btn-Thu" class="day-btn px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg transition-all text-slate-600">木</button>
                <button onclick="changeDay('Fri')" id="btn-Fri" class="day-btn px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg transition-all text-slate-600">金</button>
            </div>
        </div>
    </header>

    <!-- メイン領域 -->
    <main class="flex-1 flex overflow-hidden bg-slate-50" id="dashboard-view">
        <!-- 左カラム：ToDoリスト -->
        <section class="w-64 md:w-72 border-r border-slate-200 bg-white flex flex-col shrink-0">
            <div class="p-3 border-b border-slate-100 bg-slate-50/50">
                <div class="flex items-center justify-between mb-2">
                    <h2 class="font-bold text-slate-800 text-sm md:text-base"><i class="fa-solid fa-list-check text-blue-600 mr-1"></i> Google ToDo</h2>
                    <span id="unplanned-count" class="bg-blue-50 text-blue-700 text-[10px] font-bold px-2 py-0.5 rounded-full border border-blue-100">0件</span>
                </div>
                <form id="new-task-form" onsubmit="handleAddTask(event)" class="flex gap-1.5">
                    <input type="text" id="new-task-title" required placeholder="タスクを追加..." class="flex-1 bg-white border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500">
                    <button type="submit" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg font-bold text-xs"><i class="fa-solid fa-plus"></i></button>
                </form>
            </div>
            <div class="px-3 py-2 border-b border-slate-100 flex gap-1 overflow-x-auto shrink-0" id="list-tabs-container">
                <!-- JSで生成 -->
            </div>
            <div class="flex-1 overflow-y-auto p-3 space-y-2" id="unplanned-task-list">
                <!-- JSで生成 -->
            </div>
        </section>

        <!-- 右カラム：時間割 -->
        <section class="flex-1 flex flex-col overflow-hidden">
            <div class="bg-white border-b border-slate-200 px-4 md:px-6 py-2 md:py-3 flex items-center justify-between shrink-0 shadow-sm">
                <div class="flex items-center gap-3">
                    <div class="flex items-center bg-slate-100 p-1 rounded-lg">
                        <button onclick="navigateWeek(-1)" class="px-2 py-1 hover:bg-white rounded"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                        <select id="week-selector" onchange="selectWeek(this.value)" class="bg-transparent text-xs md:text-sm font-extrabold text-slate-900 outline-none px-1"></select>
                        <button onclick="navigateWeek(1)" class="px-2 py-1 hover:bg-white rounded"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-lg md:text-2xl font-black text-slate-900" id="current-day-label">月曜日</span>
                        <span class="text-[10px] md:text-xs font-bold text-slate-500" id="day-date-label">4月6日(月)</span>
                    </div>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto overflow-x-auto p-3 md:p-4" id="timetable-scroll-wrapper">
                <div id="timetable-container" class="w-full"></div>
            </div>
        </section>
    </main>

    <!-- 基本時間割設定ビュー -->
    <section id="basic-settings-view" class="hidden flex-1 overflow-hidden flex flex-col bg-slate-50">
        <div class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between">
            <h2 class="font-bold text-lg text-slate-900"><i class="fa-solid fa-gears text-emerald-600 mr-2"></i>基本時間割の設定</h2>
            <div class="flex gap-2">
                <button onclick="toggleViewState('dashboard')" class="text-xs font-bold px-3 py-2 bg-slate-100 rounded-lg">キャンセル</button>
                <button onclick="saveBasicTimetable()" class="text-xs font-bold px-4 py-2 bg-emerald-600 text-white rounded-lg">保存</button>
            </div>
        </div>
        <div class="flex-1 overflow-auto p-6">
            <div class="flex gap-4 min-w-max pb-10" id="basic-timetable-editor-container"></div>
        </div>
    </section>

    <!-- 総合コントロールメニュー（モーダル） -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-slate-950/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col max-h-[90vh]">
            <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50 shrink-0">
                <h3 class="font-bold text-slate-900 text-base"><i class="fa-solid fa-sliders text-blue-600 mr-2"></i>メニュー設定</h3>
                <button onclick="closeSettingsModal()" class="text-slate-400 hover:bg-slate-200 p-1.5 rounded-lg"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="p-5 overflow-y-auto space-y-5">
                <!-- 同期ステータスとAPI設定 -->
                <div class="bg-blue-50/50 border border-blue-100 p-4 rounded-xl space-y-3">
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-bold text-slate-700">Google ToDo 連携状況</span>
                        <div class="flex items-center gap-1.5" id="sync-status-indicator">
                            <span class="relative flex h-2.5 w-2.5"><span class="absolute inline-flex h-full w-full rounded-full bg-slate-400"></span></span>
                            <span class="text-[10px] font-bold text-slate-500">未接続</span>
                        </div>
                    </div>
                    <div>
                        <input type="text" id="settings-client-id" placeholder="Google Client ID" class="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-xs focus:ring-1 focus:ring-blue-500">
                    </div>
                    <div id="settings-list-select-container" class="hidden">
                        <select id="settings-target-list" class="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-xs"></select>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="startGoogleAuth()" id="btn-google-login" class="flex-1 bg-blue-600 text-white text-xs font-bold py-2 rounded-lg"><i class="fa-brands fa-google mr-1"></i>接続</button>
                        <button onclick="disconnectGoogle()" id="btn-google-logout" class="hidden flex-1 bg-slate-200 text-slate-700 text-xs font-bold py-2 rounded-lg">解除</button>
                        <button onclick="manualSyncTrigger()" class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-2 rounded-lg" title="手動同期"><i class="fa-solid fa-rotate"></i></button>
                    </div>
                </div>

                <!-- 機能ボタン群 -->
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="exportToCSV()" class="bg-emerald-50 hover:bg-emerald-100 text-emerald-800 border border-emerald-200 p-3 rounded-xl text-sm font-bold flex flex-col items-center justify-center gap-2 transition-all">
                        <i class="fa-solid fa-file-excel text-xl"></i> CSVエクスポート
                    </button>
                    <button onclick="toggleViewState('basic-settings'); closeSettingsModal();" class="bg-slate-100 hover:bg-slate-200 text-slate-800 border border-slate-200 p-3 rounded-xl text-sm font-bold flex flex-col items-center justify-center gap-2 transition-all">
                        <i class="fa-solid fa-calendar-week text-xl"></i> 基本時間割の設定
                    </button>
                    <button onclick="toggleDarkMode()" id="btn-dark-mode" class="col-span-2 bg-slate-100 text-slate-800 border border-slate-200 p-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2">
                        <i class="fa-solid fa-moon text-indigo-600"></i> ダークモード切替
                    </button>
                </div>

                <hr class="border-slate-100">

                <!-- 端末間バックアップ -->
                <div>
                    <h4 class="text-xs font-bold text-slate-700 mb-2"><i class="fa-solid fa-cloud-arrow-down mr-1"></i>端末間データ同期（バックアップ）</h4>
                    <p class="text-[10px] text-slate-500 mb-2">iPadとPC等で設定を同期するためのファイルを入出力します。</p>
                    <div class="flex gap-2">
                        <button onclick="exportDataFile()" class="flex-1 bg-slate-800 text-white text-xs font-bold py-2 rounded-lg">設定を書き出す</button>
                        <label class="flex-1 bg-slate-200 text-slate-700 text-xs font-bold py-2 rounded-lg text-center cursor-pointer">
                            読み込む
                            <input type="file" onchange="importDataFile(event)" accept=".json" class="hidden">
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 授業詳細モーダル -->
    <div id="class-detail-modal" class="hidden fixed inset-0 bg-slate-950/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-xl flex flex-col max-h-[80vh]">
            <div class="px-5 py-4 border-b border-slate-100 flex justify-between items-start">
                <div>
                    <span class="text-[10px] font-bold text-emerald-700 bg-emerald-50 px-2 py-0.5 rounded" id="modal-period"></span>
                    <h3 class="font-black text-slate-900 text-xl mt-1" id="modal-title"></h3>
                </div>
                <button onclick="closeModal()" class="p-1"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="p-5 overflow-y-auto flex-1 space-y-4">
                <!-- 連絡事項 -->
                <div>
                    <label class="text-xs font-bold text-slate-800 mb-1 block">連絡事項</label>
                    <div class="flex gap-1 mb-2">
                        <input type="text" id="new-announcement-input" class="flex-1 border rounded px-2 py-1 text-xs">
                        <button onclick="addAnnouncement()" class="bg-emerald-600 text-white px-3 py-1 rounded text-xs font-bold">追加</button>
                    </div>
                    <ul id="modal-announcement-list" class="space-y-1"></ul>
                </div>
                <hr>
                <!-- タスク -->
                <div>
                    <label class="text-xs font-bold text-slate-800 mb-1 block">この時間のタスク</label>
                    <div id="modal-assigned-tasks" class="space-y-1"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 bg-slate-900 text-white px-5 py-3 rounded-xl shadow-xl flex items-center gap-2 translate-y-20 opacity-0 transition-all z-50">
        <i class="fa-solid fa-check text-emerald-400"></i><p class="text-sm font-bold" id="toast-message"></p>
    </div>

    <script>
        // --- 状態管理 ---
        let currentDay = 'Mon'; 
        let currentWeek = 1;   
        let selectedFilter = 'all'; 
        let activeModalPeriodId = null; 
        let viewMode = 'daily'; 
        
        let isDarkMode = localStorage.getItem('tn_dark_mode') === 'true';
        if (isDarkMode) document.documentElement.classList.add('dark');

        let googleClientId = localStorage.getItem('tn_google_client_id') || '';
        let googleToken = localStorage.getItem('tn_google_token') || null;
        let googleTargetListId = localStorage.getItem('tn_google_target_list_id') || 'all';
        let isGoogleConnected = (googleToken !== null);
        let tokenExpiry = localStorage.getItem('tn_token_expiry') || 0;
        let googleTaskLists = [];
        let isGsiLoaded = false;
        let tokenClient;

        const dayNames = { 'Mon':'月曜日', 'Tue':'火曜日', 'Wed':'水曜日', 'Thu':'木曜日', 'Fri':'金曜日' };
        const baseDate = new Date(2026, 3, 6);

        function getFormattedDate(weekNum, dayCode) {
            const offsets = { 'Mon':0, 'Tue':1, 'Wed':2, 'Thu':3, 'Fri':4 };
            const days = (weekNum - 1) * 7 + offsets[dayCode];
            const d = new Date(baseDate.getTime() + days * 86400000);
            return (d.getMonth() + 1) + '月' + d.getDate() + '日(' + dayNames[dayCode].charAt(0) + ')';
        }

        // --- データ構造 (毎日1〜7限＋放課後) ---
        function createDefaultDay(dayCode) {
            return [
                { id: dayCode+'-period-1', num: '1', type: 'class', subject: '国語総合', class: '1年A組' },
                { id: dayCode+'-period-2', num: '2', type: 'class', subject: '数学I', class: '1年B組' },
                { id: dayCode+'-period-3', num: '3', type: 'empty', subject: '空きコマ', class: '' },
                { id: dayCode+'-period-4', num: '4', type: 'class', subject: '英語表現', class: '2年C組' },
                { id: dayCode+'-period-lunch', num: '昼', type: 'empty', subject: '昼休み', class: '' },
                { id: dayCode+'-period-5', num: '5', type: 'class', subject: '数学A', class: '1年A組' },
                { id: dayCode+'-period-6', num: '6', type: 'class', subject: '総合', class: '1年A組' },
                { id: dayCode+'-period-7', num: '7', type: 'empty', subject: '空きコマ', class: '' },
                { id: dayCode+'-period-after', num: '放', type: 'afterschool', subject: '部活動・校務', class: '職員室' }
            ];
        }

        let timetableData = {
            'Mon': createDefaultDay('Mon'), 'Tue': createDefaultDay('Tue'),
            'Wed': createDefaultDay('Wed'), 'Thu': createDefaultDay('Thu'), 'Fri': createDefaultDay('Fri')
        };
        timetableData['Mon'][1].subject = '数学II';

        let tasks = [];
        let weeklyDetails = {};
        let temporaryChanges = {};

        function loadAllData() {
            try {
                const sd = localStorage.getItem('tn_data');
                if (sd) {
                    const d = JSON.parse(sd);
                    tasks = d.tasks || [];
                    weeklyDetails = d.weeklyDetails || {};
                    temporaryChanges = d.temporaryChanges || {};
                    timetableData = d.timetableData || timetableData;
                }
            } catch(e) {}
        }

        function saveAllData() {
            localStorage.setItem('tn_data', JSON.stringify({tasks, weeklyDetails, temporaryChanges, timetableData}));
        }

        // --- カラーパレットシステム ---
        function getSubjectColors(subjectName, type) {
            if (type === 'empty') return { bg: 'bg-amber-50/20 border-dashed border-amber-200', borderL: 'border-l-4 border-l-amber-400', badge: 'bg-amber-100 text-amber-800 border-amber-200' };
            if (type === 'afterschool') return { bg: 'bg-indigo-50/10 border-indigo-100', borderL: 'border-l-4 border-l-indigo-500', badge: 'bg-indigo-600 text-white' };

            const palettes = [
                { bg: 'bg-blue-50/40 border-blue-100', borderL: 'border-l-4 border-l-blue-500', badge: 'bg-blue-600 text-white' },
                { bg: 'bg-rose-50/40 border-rose-100', borderL: 'border-l-4 border-l-rose-500', badge: 'bg-rose-600 text-white' },
                { bg: 'bg-emerald-50/40 border-emerald-100', borderL: 'border-l-4 border-l-emerald-500', badge: 'bg-emerald-600 text-white' },
                { bg: 'bg-purple-50/40 border-purple-100', borderL: 'border-l-4 border-l-purple-500', badge: 'bg-purple-600 text-white' },
                { bg: 'bg-orange-50/40 border-orange-100', borderL: 'border-l-4 border-l-orange-500', badge: 'bg-orange-600 text-white' },
                { bg: 'bg-cyan-50/40 border-cyan-100', borderL: 'border-l-4 border-l-cyan-500', badge: 'bg-cyan-600 text-white' },
                { bg: 'bg-pink-50/40 border-pink-100', borderL: 'border-l-4 border-l-pink-500', badge: 'bg-pink-600 text-white' },
                { bg: 'bg-teal-50/40 border-teal-100', borderL: 'border-l-4 border-l-teal-500', badge: 'bg-teal-600 text-white' }
            ];

            const name = subjectName || "";
            let h = 0;
            for (let i = 0; i < name.length; i++) { h = h * 31 + name.charCodeAt(i); }
            return palettes[Math.abs(h) % palettes.length];
        }

        // --- カレンダー自動追従 ---
        function jumpToToday() {
            const now = new Date();
            let dayCode = 'Mon';
            const dw = now.getDay();
            if (dw === 1) dayCode = 'Mon'; else if (dw === 2) dayCode = 'Tue';
            else if (dw === 3) dayCode = 'Wed'; else if (dw === 4) dayCode = 'Thu';
            else if (dw === 5) dayCode = 'Fri';

            const diff = now.getTime() - baseDate.getTime();
            let week = Math.floor(diff / 86400000 / 7) + 1;
            if (week < 1) week = 1; if (week > 45) week = 45;
            currentWeek = week;
            currentDay = dayCode;
        }

        // --- 初期化 ---
        window.onload = function() {
            loadAllData();
            jumpToToday();
            
            const sel = document.getElementById('week-selector');
            for(let i=1; i<=45; i++) {
                sel.innerHTML += '<option value="' + i + '">第 ' + i + ' 週</option>';
            }
            sel.value = currentWeek;

            if (window.isGsiLoadedEarly) initGoogleIdentity();
            else setTimeout(() => { if(!isGsiLoaded) initGoogleIdentity(); }, 2000);
            
            updateDarkModeButton();
            renderDashboard();
        };

        // --- 表示切り替え ---
        function setViewMode(mode) {
            viewMode = mode;
            document.querySelectorAll('#btn-view-daily, #btn-view-three-day, #btn-view-weekly').forEach(b => {
                b.className = "px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg transition-all text-slate-600";
            });
            document.getElementById('btn-view-' + mode).className = "px-3 py-1.5 text-xs md:text-sm font-bold rounded-lg transition-all bg-white text-slate-900 shadow-sm";
            
            const nav = document.getElementById('day-nav-container');
            if (mode === 'weekly') nav.classList.add('invisible');
            else nav.classList.remove('invisible');
            
            renderDashboard();
        }

        function changeDay(dc) {
            currentDay = dc;
            document.querySelectorAll('.day-btn').forEach(b => b.className = "day-btn px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg transition-all text-slate-600");
            document.getElementById('btn-'+dc).className = "day-btn px-3 py-1.5 text-xs md:text-sm font-bold rounded-lg transition-all bg-white text-emerald-700 shadow-sm";
            renderDashboard();
        }

        function navigateWeek(dir) {
            let w = currentWeek + dir;
            if (w >= 1 && w <= 45) selectWeek(w);
        }

        function selectWeek(w) {
            currentWeek = parseInt(w);
            document.getElementById('week-selector').value = currentWeek;
            renderDashboard();
        }

        // --- レンダリングコア ---
        function renderDashboard() {
            // Header text
            const lblDay = document.getElementById('current-day-label');
            const lblDate = document.getElementById('day-date-label');
            if (viewMode === 'daily') {
                lblDay.innerText = dayNames[currentDay];
                lblDate.innerText = getFormattedDate(currentWeek, currentDay);
            } else if (viewMode === 'three-day') {
                lblDay.innerText = '3日表示';
                const d = get3Days();
                lblDate.innerText = getFormattedDate(currentWeek, d[0]) + '〜' + getFormattedDate(currentWeek, d[2]);
            } else {
                lblDay.innerText = '週表示';
                lblDate.innerText = getFormattedDate(currentWeek, 'Mon') + '〜' + getFormattedDate(currentWeek, 'Fri');
            }

            renderUnplannedTasks();

            const tc = document.getElementById('timetable-container');
            tc.innerHTML = '';
            
            if (viewMode === 'daily') {
                tc.className = "flex flex-col space-y-3 max-w-2xl mx-auto";
                renderPeriods(timetableData[currentDay], tc, currentDay, false);
            } else {
                tc.className = viewMode === 'three-day' ? "grid grid-cols-3 gap-3 min-w-[700px]" : "grid grid-cols-5 gap-3 min-w-[1000px]";
                const days = viewMode === 'three-day' ? get3Days() : ['Mon','Tue','Wed','Thu','Fri'];
                days.forEach(dc => {
                    const col = document.createElement('div');
                    col.className = "bg-white border border-slate-200 rounded-xl p-3 shadow-sm";
                    col.innerHTML = '<h3 class="font-bold text-center mb-2 text-slate-800">' + dayNames[dc].charAt(0) + '</h3>';
                    const wrap = document.createElement('div');
                    wrap.className = "space-y-2";
                    renderPeriods(timetableData[dc], wrap, dc, true);
                    col.appendChild(wrap);
                    tc.appendChild(col);
                });
            }
        }

        function get3Days() {
            if(currentDay==='Mon') return ['Mon','Tue','Wed'];
            if(currentDay==='Tue') return ['Tue','Wed','Thu'];
            return ['Wed','Thu','Fri'];
        }

        function renderPeriods(periods, container, dc, isCompact) {
            periods.forEach(p => {
                const key = 'w' + currentWeek + '-' + p.id;
                const d = (temporaryChanges[key]) ? {...p, ...temporaryChanges[key]} : p;
                const colors = getSubjectColors(d.subject, d.type);
                
                let hClass = "min-h-[88px]";
                if(d.num==='昼') hClass = "min-h-[32px] py-1";
                else if(d.num==='放') hClass = "min-h-[65px]";

                const el = document.createElement('div');
                el.className = colors.bg + " border " + colors.borderL + " rounded-lg px-2.5 py-2 flex flex-col justify-between cursor-pointer " + hClass + " shadow-sm relative group";
                el.onclick = () => openClassDetail(p.id);

                let badge = '<span class="inline-block w-6 text-center text-[10px] font-black rounded-sm ' + colors.badge + '">' + d.num + '</span>';
                
                let tHtml = '';
                const ts = tasks.filter(t => t.assignedPeriodId === key && !t.completed);
                if(ts.length > 0) {
                    tHtml = '<div class="mt-1 space-y-0.5">' + ts.map(t => '<div class="text-[10px] bg-white/80 px-1 rounded truncate border border-slate-100 font-bold">' + escapeHTML(t.title) + '</div>').join('') + '</div>';
                }

                if(d.type==='empty') {
                    el.innerHTML = '<div class="flex gap-2">' + badge + '<span class="text-xs font-bold opacity-60 text-amber-900">' + d.subject + '</span></div>' + tHtml;
                } else if(d.type==='afterschool') {
                    el.innerHTML = '<div class="flex gap-2">' + badge + '<span class="text-[11px] font-bold text-indigo-900">' + d.subject + '</span></div>' + tHtml;
                } else {
                    el.innerHTML = [
                        '<div class="flex items-start gap-1.5">',
                        badge,
                        '<div class="flex-1 min-w-0 leading-tight">',
                        '   <div class="text-[13px] md:text-[14px] font-black text-slate-900 truncate">' + escapeHTML(d.subject) + '</div>',
                        d.class ? '   <div class="text-[10px] font-bold text-emerald-800">' + escapeHTML(d.class) + '</div>' : '',
                        '</div></div>', tHtml
                    ].join('');
                }
                container.appendChild(el);
            });
        }

        // --- ToDo周り ---
        function filterTasks(cat) { selectedFilter = cat; renderUnplannedTasks(); }
        
        function renderUnplannedTasks() {
            const lc = document.getElementById('unplanned-task-list');
            lc.innerHTML = '';
            document.getElementById('unplanned-count').innerText = tasks.filter(t=>!t.assignedPeriodId && !t.completed).length + '件';

            const ft = tasks.filter(t => (!t.assignedPeriodId && !t.completed && (selectedFilter==='all' || t.list===selectedFilter)));
            ft.forEach(t => {
                const d = document.createElement('div');
                d.className = "bg-white border border-slate-200 p-2.5 rounded-lg shadow-sm text-xs flex gap-2 items-start";
                d.innerHTML = '<input type="checkbox" onchange="toggleTask(\''+t.id+'\')" class="mt-0.5"><div class="font-bold flex-1">' + escapeHTML(t.title) + '</div><button onclick="quickAssign(\''+t.id+'\')" class="text-blue-500"><i class="fa-solid fa-arrow-right"></i></button>';
                lc.appendChild(d);
            });
        }
        
        function handleAddTask(e) {
            e.preventDefault();
            const val = document.getElementById('new-task-title').value.trim();
            if(val) { tasks.unshift({ id:'t_'+Date.now(), title:val, list:'その他', completed:false, assignedPeriodId:null }); saveAllData(); renderDashboard(); document.getElementById('new-task-title').value=''; }
        }

        function toggleTask(id) {
            const t = tasks.find(x=>x.id===id);
            if(t) { t.completed = true; saveAllData(); renderDashboard(); showToast('タスク完了！'); }
        }

        function quickAssign(id) {
            const p = timetableData[currentDay].find(x=>x.type==='empty' || x.type==='afterschool');
            if(p) {
                const t = tasks.find(x=>x.id===id);
                t.assignedPeriodId = 'w'+currentWeek+'-'+p.id;
                saveAllData(); renderDashboard(); showToast('配置しました');
            } else { showToast('本日に空きコマがありません'); }
        }

        // --- モーダル・設定 ---
        function openSettingsModal() { 
            document.getElementById('settings-client-id').value = googleClientId;
            document.getElementById('settings-modal').classList.remove('hidden'); 
            updateGoogleStatusUI(isGoogleConnected);
        }
        function closeSettingsModal() { document.getElementById('settings-modal').classList.add('hidden'); }

        function openClassDetail(id) {
            activeModalPeriodId = id;
            document.getElementById('class-detail-modal').classList.remove('hidden');
            const p = timetableData[currentDay].find(x=>x.id===id);
            document.getElementById('modal-period').innerText = p.num;
            document.getElementById('modal-title').innerText = p.subject;
            renderAnnouncements();
        }
        function closeModal() { document.getElementById('class-detail-modal').classList.add('hidden'); }

        function renderAnnouncements() {
            const key = 'w'+currentWeek+'-'+activeModalPeriodId;
            const det = weeklyDetails[key] || {announcements:[]};
            const ul = document.getElementById('modal-announcement-list');
            ul.innerHTML = det.announcements.map((a,i) => '<li class="text-xs bg-slate-50 p-2 rounded flex justify-between"><span>'+escapeHTML(a)+'</span><button onclick="delAnn('+i+')" class="text-red-500"><i class="fa-solid fa-xmark"></i></button></li>').join('');
        }
        function addAnnouncement() {
            const v = document.getElementById('new-announcement-input').value.trim();
            if(v) {
                const k = 'w'+currentWeek+'-'+activeModalPeriodId;
                if(!weeklyDetails[k]) weeklyDetails[k] = {announcements:[]};
                weeklyDetails[k].announcements.push(v);
                document.getElementById('new-announcement-input').value = '';
                saveAllData(); renderAnnouncements(); renderDashboard();
            }
        }
        function delAnn(i) {
            weeklyDetails['w'+currentWeek+'-'+activeModalPeriodId].announcements.splice(i,1);
            saveAllData(); renderAnnouncements(); renderDashboard();
        }

        // --- 端末間同期 ---
        function exportDataFile() {
            const data = { tasks, weeklyDetails, temporaryChanges, timetableData };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'teachers-nexus-backup.json';
            a.click();
            showToast('設定を書き出しました');
        }
        function importDataFile(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const d = JSON.parse(ev.target.result);
                    if(d.tasks) tasks = d.tasks;
                    if(d.weeklyDetails) weeklyDetails = d.weeklyDetails;
                    if(d.timetableData) timetableData = d.timetableData;
                    saveAllData(); renderDashboard(); closeSettingsModal(); showToast('復元成功！');
                } catch(e) { showToast('ファイル形式エラー'); }
            };
            reader.readAsText(file);
        }

        // --- その他UI ---
        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            if(isDarkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            localStorage.setItem('tn_dark_mode', isDarkMode);
            updateDarkModeButton();
        }
        function updateDarkModeButton() {
            const btn = document.getElementById('btn-dark-mode');
            if(btn) btn.innerHTML = isDarkMode ? '<i class="fa-solid fa-sun text-amber-400"></i> ライトモード切替' : '<i class="fa-solid fa-moon text-indigo-600"></i> ダークモード切替';
        }
        
        function toggleViewState(v) {
            if(v==='basic-settings') {
                document.getElementById('dashboard-view').classList.add('hidden');
                document.getElementById('basic-settings-view').classList.remove('hidden');
                renderBasicSettings();
            } else {
                document.getElementById('dashboard-view').classList.remove('hidden');
                document.getElementById('basic-settings-view').classList.add('hidden');
                renderDashboard();
            }
        }
        
        function renderBasicSettings() {
            const c = document.getElementById('basic-timetable-editor-container');
            c.innerHTML = '';
            ['Mon','Tue','Wed','Thu','Fri'].forEach(dc => {
                let html = '<div class="w-64 bg-white p-3 rounded-xl border border-slate-200"><h4 class="font-bold mb-2">' + dayNames[dc] + '</h4><div class="space-y-2">';
                timetableData[dc].forEach(p => {
                    html += '<div class="flex flex-col gap-1"><span class="text-xs font-bold text-slate-500">'+p.num+'</span><input type="text" id="b-'+p.id+'-s" value="'+escapeHTML(p.subject)+'" class="border rounded px-2 py-1 text-xs"><input type="text" id="b-'+p.id+'-c" value="'+escapeHTML(p.class)+'" class="border rounded px-2 py-1 text-[10px]"></div>';
                });
                html += '</div></div>';
                c.innerHTML += html;
            });
        }

        function saveBasicTimetable() {
            ['Mon','Tue','Wed','Thu','Fri'].forEach(dc => {
                timetableData[dc].forEach(p => {
                    p.subject = document.getElementById('b-'+p.id+'-s').value;
                    p.class = document.getElementById('b-'+p.id+'-c').value;
                });
            });
            saveAllData(); toggleViewState('dashboard'); showToast('基本設定を保存しました');
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            document.getElementById('toast-message').innerText = m;
            t.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function escapeHTML(s) { return (s||'').replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]||c)); }
        
        // Google Auth Dummies/Stubs to prevent errors
        function initGoogleIdentity() {}
        function startGoogleAuth() { showToast('デモ: Googleログイン画面を開きます'); }
        function disconnectGoogle() { isGoogleConnected=false; updateGoogleStatusUI(false); showToast('解除しました'); }
        function manualSyncTrigger() { showToast('同期完了'); }
        function updateGoogleStatusUI(conn) {
            const ind = document.getElementById('sync-status-indicator');
            if(conn) ind.innerHTML = '<span class="relative flex h-2.5 w-2.5"><span class="absolute inline-flex h-full w-full rounded-full bg-emerald-400 animate-ping"></span><span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span></span><span class="text-[10px] font-bold text-emerald-600">同期済</span>';
            else ind.innerHTML = '<span class="relative flex h-2.5 w-2.5"><span class="absolute inline-flex h-full w-full rounded-full bg-slate-400"></span></span><span class="text-[10px] font-bold text-slate-500">未接続</span>';
        }
        function exportToCSV() { showToast('CSV書き出し（ダミー）'); }
    </script>
</body>
</html>
